<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Digests</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }

  .header h1 span { color: #FF6B35; }

  .status-pill {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-pill.ok { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
  .status-pill.degraded { background: rgba(255, 193, 7, 0.15); color: #ffc107; }
  .status-pill.critical { background: rgba(244, 67, 54, 0.15); color: #f44336; }

  .digest-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .digest-row {
    background: #141414;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px 20px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .digest-row:hover { border-color: #444; }

  .digest-header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .digest-date {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    min-width: 100px;
  }

  .digest-summary {
    font-size: 13px;
    color: #999;
    flex: 1;
  }

  .digest-count {
    font-size: 13px;
    color: #666;
    font-variant-numeric: tabular-nums;
  }

  .digest-details {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #222;
  }

  .digest-row.expanded .digest-details { display: block; }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .section-title:first-child { margin-top: 0; }

  .attention-item {
    padding: 6px 12px;
    margin-bottom: 4px;
    border-radius: 4px;
    font-size: 13px;
  }

  .attention-item.warn {
    background: rgba(255, 193, 7, 0.08);
    color: #ffc107;
    border-left: 3px solid #ffc107;
  }

  .attention-item.info {
    background: rgba(100, 100, 100, 0.08);
    color: #888;
    border-left: 3px solid #555;
  }

  .sources-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .sources-table th {
    text-align: left;
    padding: 6px 12px;
    color: #666;
    font-weight: 500;
    border-bottom: 1px solid #222;
  }

  .sources-table td {
    padding: 6px 12px;
    border-bottom: 1px solid #1a1a1a;
    font-variant-numeric: tabular-nums;
  }

  .sources-table tr.warn td:first-child {
    color: #ffc107;
  }

  .cat-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 13px;
  }

  .cat-bar-label {
    min-width: 100px;
    color: #999;
  }

  .cat-bar-fill {
    height: 16px;
    background: #FF6B35;
    border-radius: 3px;
    opacity: 0.6;
  }

  .cat-bar-count {
    color: #666;
    font-variant-numeric: tabular-nums;
  }

  .scrape-info {
    font-size: 13px;
    color: #666;
    margin-top: 12px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #555;
    font-size: 15px;
  }

  .email-badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(100, 100, 100, 0.2);
    color: #666;
  }

  .email-badge.sent {
    background: rgba(76, 175, 80, 0.1);
    color: #4caf50;
  }

  /* Nav */
  .bestie-nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; height: 36px;
    background: #111; border-bottom: 1px solid #222;
    padding: 0 16px; font-size: 13px;
    margin: -24px -24px 24px -24px;
  }
  .bestie-nav-link {
    color: #888; text-decoration: none; padding: 0 12px;
    line-height: 36px; transition: color 0.15s;
  }
  .bestie-nav-link:hover { color: #ccc; }
  .bestie-nav-link.active { color: #FF6B35; font-weight: 600; }
  .bestie-nav-sep { width: 1px; height: 16px; background: #333; margin: 0 4px; flex-shrink: 0; }
  @media (max-width: 600px) {
    .bestie-nav { margin: -12px -12px 12px -12px; }
  }
</style>
</head>
<body>

<nav class="bestie-nav">
  <a href="/health" class="bestie-nav-link">Health</a>
  <a href="/events" class="bestie-nav-link">Events</a>
  <a href="/digests" class="bestie-nav-link active">Digests</a>
  <span class="bestie-nav-sep"></span>
  <a href="/eval" class="bestie-nav-link">Traces</a>
  <a href="/eval-report" class="bestie-nav-link">Reports</a>
  <a href="/eval-quality" class="bestie-nav-link">Quality</a>
  <a href="/evals" class="bestie-nav-link">Eval Guide</a>
  <span class="bestie-nav-sep"></span>
  <a href="/test" class="bestie-nav-link">Simulator</a>
</nav>

<div class="header">
  <h1><span>Pulse</span> Digests</h1>
</div>

<div id="digest-list" class="digest-list">
  <div class="empty-state">Loading...</div>
</div>

<script>
const STATUS_MAP = { green: 'ok', yellow: 'degraded', red: 'critical' };

async function loadDigests() {
  try {
    const res = await fetch('/api/digests');
    const digests = await res.json();
    renderDigests(digests);
  } catch (err) {
    document.getElementById('digest-list').innerHTML = '<div class="empty-state">Failed to load digests</div>';
  }
}

function renderDigests(digests) {
  const container = document.getElementById('digest-list');
  if (!digests.length) {
    container.innerHTML = '<div class="empty-state">No digests yet. A digest is generated after each daily scrape.</div>';
    return;
  }

  container.innerHTML = digests.map(d => {
    const r = d.report;
    const pillClass = STATUS_MAP[r.status] || 'ok';
    const emailBadge = d.email_sent
      ? '<span class="email-badge sent">emailed</span>'
      : (r.status === 'green' ? '' : '<span class="email-badge">not emailed</span>');

    return `
      <div class="digest-row" onclick="this.classList.toggle('expanded')">
        <div class="digest-header">
          <span class="digest-date">${r.id}</span>
          <span class="status-pill ${pillClass}">${r.status}</span>
          ${emailBadge}
          <span class="digest-summary">${r.summary}</span>
          <span class="digest-count">${(r.cache?.total || 0).toLocaleString()} events</span>
        </div>
        <div class="digest-details">
          ${renderDetails(r)}
        </div>
      </div>
    `;
  }).join('');
}

function renderDetails(r) {
  let html = '';

  // Cache stats
  const changePct = r.cache?.change_pct || 0;
  const changeStr = changePct > 0 ? `+${changePct}%` : `${changePct}%`;
  html += `<div class="scrape-info">Cache: ${(r.cache?.total || 0).toLocaleString()} total (${changeStr} vs yesterday) | Free: ${r.cache?.free || 0} | Paid: ${r.cache?.paid || 0}</div>`;

  // Needs attention
  if (r.needs_attention?.length > 0) {
    html += '<div class="section-title">Needs Attention</div>';
    html += r.needs_attention.map(item =>
      `<div class="attention-item ${item.severity}">${item.source}: ${item.issue}</div>`
    ).join('');
  }

  // Sources table
  if (r.sources?.length > 0) {
    html += '<div class="section-title">Sources</div>';
    html += '<table class="sources-table"><thead><tr><th>Source</th><th>Count</th><th>Avg 7d</th><th>Status</th></tr></thead><tbody>';
    const sorted = [...r.sources].sort((a, b) => b.count - a.count);
    html += sorted.map(s =>
      `<tr class="${s.status === 'warn' ? 'warn' : ''}"><td>${s.name}</td><td>${s.count}</td><td>${s.avg_7d}</td><td>${s.status}</td></tr>`
    ).join('');
    html += '</tbody></table>';
  }

  // Categories
  if (r.categories && Object.keys(r.categories).length > 0) {
    html += '<div class="section-title">Categories</div>';
    const cats = Object.entries(r.categories).sort((a, b) => b[1] - a[1]);
    const maxCount = cats[0]?.[1] || 1;
    html += cats.map(([name, count]) =>
      `<div class="cat-bar"><span class="cat-bar-label">${name}</span><div class="cat-bar-fill" style="width: ${Math.max(4, (count / maxCount) * 200)}px"></div><span class="cat-bar-count">${count}</span></div>`
    ).join('');
  }

  // Scrape info
  if (r.scrape?.duration_ms) {
    html += `<div class="scrape-info" style="margin-top: 16px">Scrape: ${(r.scrape.duration_ms / 1000).toFixed(1)}s | ${r.scrape.sources_ok} ok, ${r.scrape.sources_failed} failed</div>`;
  }

  if (r.user_facing_errors > 0) {
    html += `<div class="scrape-info" style="color: #f44336">User-facing errors in last 24h: ${r.user_facing_errors}</div>`;
  }

  return html;
}

loadDigests();
setInterval(loadDigests, 5 * 60 * 1000);
</script>
</body>
</html>
