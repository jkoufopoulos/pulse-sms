<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carryover Eval Workspace</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 24px; max-width: 1400px; color: #222; }
    .scenario-grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; height: calc(100vh - 180px); }
    .chat-col { overflow-y: auto; padding-right: 10px; border-right: 1px solid #e5e7eb; }
    .detail-col { overflow-y: auto; padding-left: 10px; }
    .bubble { padding: 8px 12px; border-radius: 12px; max-width: 90%; font-size: 13px; line-height: 1.4; word-break: break-word; }
    .bubble.user { background: #dbeafe; color: #1e3a8a; margin-left: auto; border-bottom-right-radius: 4px; }
    .bubble.ai { background: #f3f4f6; color: #111827; margin-right: auto; border-bottom-left-radius: 4px; cursor: pointer; }
    .bubble.ai:hover { background: #e5e7eb; }
    .bubble.ai.focused { box-shadow: 0 0 0 2px #2563eb; background: #eff6ff; }
    .bubble.ai.labeled { border-left: 3px solid #10b981; }
    .bubble.ai.matcher-fail { border-left: 3px solid #ef4444; }
    .chat-turn { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .turn-meta { font-size: 10px; color: #6b7280; margin: 0 4px; }
    .turn-tool-badge { display: inline-block; background: #e5e7eb; color: #374151; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
    h1 { font-size: 20px; margin: 0 0 16px; }
    h2 { font-size: 16px; margin: 24px 0 8px; }
    .crumbs { color: #666; font-size: 13px; margin-bottom: 12px; }
    .crumbs a { color: #2563eb; text-decoration: none; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border-bottom: 1px solid #eee; padding: 8px 10px; text-align: left; }
    tr.runrow:hover, tr.screnrow:hover { background: #f9fafb; cursor: pointer; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge.pass { background: #d1fae5; color: #065f46; }
    .badge.fail { background: #fee2e2; color: #991b1b; }
    .badge.none { background: #f3f4f6; color: #6b7280; }
    .turn { border: 1px solid #e5e7eb; border-radius: 6px; padding: 14px; margin-bottom: 14px; background: #fff; }
    .turn h3 { font-size: 14px; margin: 0 0 10px; display: flex; align-items: center; gap: 10px; }
    .turn .row { margin: 6px 0; font-size: 13px; }
    .turn .label-key { color: #6b7280; font-weight: 500; margin-right: 6px; }
    .turn pre { background: #f9fafb; padding: 8px 10px; border-radius: 4px; font-size: 12px; overflow-x: auto; margin: 6px 0; white-space: pre-wrap; word-break: break-word; }
    .score-widget { margin-top: 12px; padding-top: 10px; border-top: 1px solid #f3f4f6; }
    .score-btns { display: inline-flex; gap: 4px; margin-right: 10px; }
    .score-btns button { padding: 4px 10px; border: 1px solid #d1d5db; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .score-btns button.active { background: #2563eb; color: white; border-color: #2563eb; }
    .score-widget textarea { width: 100%; min-height: 50px; padding: 6px 8px; font-family: inherit; font-size: 13px; box-sizing: border-box; margin-top: 8px; border: 1px solid #d1d5db; border-radius: 4px; }
    .score-widget button.save { padding: 6px 14px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 6px; }
    .saved { color: #065f46; font-size: 12px; margin-left: 8px; }
    .prior { font-size: 12px; color: #6b7280; margin-top: 8px; }
    details summary { cursor: pointer; color: #2563eb; font-size: 12px; margin: 4px 0; }
  </style>
</head>
<body>
  <h1>Carryover Eval Workspace</h1>
  <div id="crumbs" class="crumbs"></div>
  <div id="view"></div>

  <script>
    const AXIS = 'context_carryover_quality';
    const state = { view: 'runs', runId: null, scenarioId: null, run: null };

    function _el(tag, attrs = {}, ...children) {
      const node = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') node.className = v;
        else if (k === 'dataset') Object.assign(node.dataset, v);
        else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
        else if (v !== null && v !== undefined) node.setAttribute(k, v);
      }
      for (const c of children) {
        if (c === null || c === undefined || c === false) continue;
        if (Array.isArray(c)) for (const cc of c) node.append(cc);
        else if (typeof c === 'string') node.append(document.createTextNode(c));
        else node.append(c);
      }
      return node;
    }
    function _replaceChildren(host, ...nodes) {
      while (host.firstChild) host.removeChild(host.firstChild);
      for (const n of nodes) if (n) host.append(n);
    }

    function fmtFlags(jsonStr) {
      if (!jsonStr) return '';
      try {
        const o = JSON.parse(jsonStr);
        return Object.entries(o).map(([k, v]) => `${k}=${v}`).join(' ');
      } catch { return jsonStr; }
    }
    function fmtShortSha(sha) { return sha ? sha.slice(0, 7) : '—'; }

    async function showRuns() {
      state.view = 'runs';
      _replaceChildren(document.getElementById('crumbs'), document.createTextNode('Runs'));
      const r = await fetch('/api/eval/runs').then(x => x.json());
      const tbody = _el('tbody');
      if (!r.runs.length) {
        tbody.append(_el('tr', {}, _el('td', { colspan: 8, style: 'color:#6b7280' },
          'No runs yet. Run ', _el('code', {}, 'npm run eval:carryover'), '.')));
      } else {
        for (const run of r.runs) {
          tbody.append(_el('tr', { class: 'runrow', onclick: () => showRun(run.id) },
            _el('td', {}, `#${run.id}`),
            _el('td', {}, _el('span', {
              class: 'badge ' + (run.source === 'production' ? 'pass' : 'none'),
            }, run.source || 'synthetic')),
            _el('td', {}, run.started_at.slice(0, 16).replace('T', ' ')),
            _el('td', {}, fmtShortSha(run.git_sha)),
            _el('td', {}, run.model || ''),
            _el('td', {}, `${run.turn_count} turns`),
            _el('td', {}, `${run.labeled_count} labeled`),
            _el('td', {}, run.matcher_evaluated > 0 ? `${run.matcher_passed}/${run.matcher_evaluated} matched` : '—'),
          ));
        }
      }
      const table = _el('table', {},
        _el('thead', {}, _el('tr', {},
          ...['Run', 'Source', 'Started', 'SHA', 'Model', 'Turns', 'Labels', 'Matcher'].map(h => _el('th', {}, h))
        )),
        tbody,
      );
      _replaceChildren(document.getElementById('view'), table);
    }

    async function showRun(runId, opts = {}) {
      state.view = 'run';
      state.runId = runId;
      state.showDiscarded = !!opts.showDiscarded;
      const url = `/api/eval/runs/${runId}` + (state.showDiscarded ? '?show=all' : '');
      const r = await fetch(url).then(x => x.json());
      state.run = r;
      _replaceChildren(document.getElementById('crumbs'),
        _el('a', { onclick: showRuns }, 'Runs'),
        document.createTextNode(` · Run #${runId}`),
      );
      // Compute first user message per scenario from the turn list (turn_index=0).
      const firstMsgByScenario = {};
      for (const t of r.turns) {
        if (t.turn_index === 0 && !firstMsgByScenario[t.scenario_id]) {
          firstMsgByScenario[t.scenario_id] = t.user_msg || '';
        }
      }
      // Sort: scenarios with 0 labels first, then by id.
      const sortedScenarios = [...r.scenarios].sort((a, b) => {
        const aDone = a.labeled_count >= a.turn_count;
        const bDone = b.labeled_count >= b.turn_count;
        if (aDone !== bDone) return aDone ? 1 : -1;  // unlabeled first
        return a.scenario_id.localeCompare(b.scenario_id);
      });
      const tbody = _el('tbody');
      for (const s of sortedScenarios) {
        const labeledFully = s.labeled_count >= s.turn_count;
        const isDiscarded = s.status === 'discarded';
        const firstMsg = firstMsgByScenario[s.scenario_id] || '';
        const matcherCell = s.matcher_evaluated > 0 ? `${s.matcher_passed}/${s.matcher_evaluated}` : '—';
        let rowStyle = '';
        if (isDiscarded) rowStyle = 'opacity:0.4; text-decoration:line-through;';
        else if (labeledFully) rowStyle = 'opacity:0.55';
        const idCell = isDiscarded
          ? _el('td', {}, s.scenario_id, ' ', _el('span', { class: 'badge fail' }, 'discarded'))
          : _el('td', {}, s.scenario_id);
        tbody.append(_el('tr', {
          class: 'screnrow',
          style: rowStyle,
          onclick: () => showScenario(s.scenario_id),
        },
          idCell,
          _el('td', { style: 'color:#374151; max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;' },
            firstMsg.slice(0, 80)),
          _el('td', {}, `${s.turn_count} turns`),
          _el('td', {}, `${s.labeled_count}/${s.turn_count} labeled`),
          _el('td', {}, matcherCell),
        ));
      }
      const meta = _el('div', { style: 'margin-bottom:12px; color:#6b7280; font-size:13px; display:flex; align-items:center; gap:12px;' },
        _el('span', {}, `${r.run.source || 'synthetic'} · ${r.run.model || ''} · ${fmtFlags(r.run.env_flags)} · ${fmtShortSha(r.run.git_sha)} · ${sortedScenarios.length} active conversations`),
        r.discarded_count > 0
          ? _el('a', {
              onclick: () => showRun(runId, { showDiscarded: !state.showDiscarded }),
              style: 'color:#2563eb; cursor:pointer; font-size:12px;',
            }, state.showDiscarded ? '← hide discarded' : `show ${r.discarded_count} discarded`)
          : null,
      );
      const table = _el('table', {},
        _el('thead', {}, _el('tr', {},
          ...['Scenario', 'First message', 'Turns', 'Labels', 'Matcher'].map(h => _el('th', {}, h))
        )),
        tbody,
      );
      _replaceChildren(document.getElementById('view'), meta, table);
    }

    async function discardScenario(scenarioId) {
      const note = prompt('(Optional) Why discard this conversation?', '');
      if (note === null) return;  // cancelled
      const r = await fetch('/api/eval/scenarios/status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ run_id: state.runId, scenario_id: scenarioId, status: 'discarded', notes: note || null }),
      }).then(x => x.json());
      if (r.ok) showRun(state.runId);
      else alert('discard failed: ' + (r.error || 'unknown'));
    }

    async function restoreScenario(scenarioId) {
      const r = await fetch('/api/eval/scenarios/status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ run_id: state.runId, scenario_id: scenarioId, status: 'active', notes: null }),
      }).then(x => x.json());
      if (r.ok) showRun(state.runId, { showDiscarded: state.showDiscarded });
      else alert('restore failed: ' + (r.error || 'unknown'));
    }

    async function showScenario(scenarioId) {
      if (state.scenarioId !== scenarioId) state.focusedTurnIdx = undefined;
      state.view = 'scenario';
      state.scenarioId = scenarioId;
      const r = state.run;
      const scenarioMeta = (r.scenarios || []).find(s => s.scenario_id === scenarioId) || {};
      const isDiscarded = scenarioMeta.status === 'discarded';
      const scenarioTurns = r.turns.filter(t => t.scenario_id === scenarioId);
      const details = await Promise.all(
        scenarioTurns.map(t => fetch(`/api/eval/turns/${t.capture_id}`).then(x => x.json()))
      );
      _replaceChildren(document.getElementById('crumbs'),
        _el('a', { onclick: showRuns }, 'Runs'),
        document.createTextNode(' · '),
        _el('a', { onclick: () => showRun(state.runId) }, `Run #${state.runId}`),
        document.createTextNode(` · ${scenarioId}`),
      );
      // Two-column layout: chat stream on the left, focused turn detail on the right.
      // Clicking an AI bubble selects the turn; the right column re-renders.

      const discardBtn = isDiscarded
        ? _el('button', {
            onclick: () => restoreScenario(scenarioId),
            style: 'padding:4px 10px; background:#fff; border:1px solid #d1d5db; border-radius:4px; cursor:pointer; font-size:12px;',
          }, 'Restore')
        : _el('button', {
            onclick: () => discardScenario(scenarioId),
            style: 'padding:4px 10px; background:#fff; border:1px solid #d1d5db; border-radius:4px; cursor:pointer; font-size:12px; color:#991b1b;',
          }, 'Discard conversation');

      const titleBar = _el('div', {
        style: 'display:flex; align-items:center; justify-content:space-between; padding:8px 0; margin-bottom:8px; border-bottom:1px solid #e5e7eb;' + (isDiscarded ? ' opacity:0.55;' : ''),
      },
        _el('span', { style: 'font-weight:600; font-size:13px;' },
          `${scenarioId} · ${scenarioTurns.length} turns`,
          isDiscarded ? _el('span', { class: 'badge fail', style: 'margin-left:8px;' }, 'discarded') : null,
        ),
        discardBtn,
      );

      // Pick the focused turn (default: first unlabeled, fallback to turn 0).
      const focusedIdx = state.focusedTurnIdx !== undefined && details[state.focusedTurnIdx]
        ? state.focusedTurnIdx
        : (details.findIndex(d => !d.prior_labels.find(l => l.trace_id === d.turn.trace_id)) !== -1
            ? details.findIndex(d => !d.prior_labels.find(l => l.trace_id === d.turn.trace_id))
            : 0);
      state.focusedTurnIdx = focusedIdx;

      const chatCol = _el('div', { class: 'chat-col' }, ...details.map((d, i) => renderChatTurn(d, i, i === focusedIdx)));
      const detailCol = _el('div', { class: 'detail-col' }, renderTurn(details[focusedIdx]));

      const grid = _el('div', { class: 'scenario-grid' }, chatCol, detailCol);
      _replaceChildren(document.getElementById('view'), titleBar, grid);
    }

    function renderChatTurn(d, idx, isFocused) {
      const t = d.turn;
      const tc = t.tool_call ? JSON.parse(t.tool_call) : null;
      const mr = t.matcher_result ? JSON.parse(t.matcher_result) : null;
      const labeled = !!d.prior_labels.find(l => l.trace_id === t.trace_id);

      const classes = ['bubble', 'ai'];
      if (isFocused) classes.push('focused');
      if (labeled) classes.push('labeled');
      if (mr && !mr.passed) classes.push('matcher-fail');

      return _el('div', { class: 'chat-turn' },
        _el('div', { class: 'turn-meta' }, `t${t.turn_index}`),
        _el('div', { class: 'bubble user' }, t.user_msg || ''),
        _el('div', {
          class: classes.join(' '),
          onclick: () => { state.focusedTurnIdx = idx; showScenario(state.scenarioId); },
        },
          _el('div', {}, t.agent_sms || _el('em', { style: 'color:#9ca3af;' }, '(no SMS)')),
          tc ? _el('span', { class: 'turn-tool-badge' }, tc.name) : null,
          labeled ? _el('span', { class: 'turn-tool-badge', style: 'background:#d1fae5; color:#065f46;' }, '✓ labeled') : null,
        ),
      );
    }

    function renderTurn(d) {
      const t = d.turn;
      const mr = t.matcher_result ? JSON.parse(t.matcher_result) : null;
      const tc = t.tool_call ? JSON.parse(t.tool_call) : null;
      const sb = t.session_before ? JSON.parse(t.session_before) : null;
      const sa = t.session_after ? JSON.parse(t.session_after) : null;
      const myPrior = d.prior_labels.find(l => l.trace_id === t.trace_id);
      const otherPrior = d.prior_labels.filter(l => l.trace_id !== t.trace_id);
      const currentScore = myPrior ? myPrior.label : null;
      const currentNotes = myPrior ? (myPrior.notes || '') : '';

      const badge = mr === null
        ? _el('span', { class: 'badge none' }, 'no expect')
        : _el('span', { class: 'badge ' + (mr.passed ? 'pass' : 'fail') },
          'matcher: ' + (mr.passed ? 'pass' : 'fail'));

      const rows = [
        _el('div', { class: 'row' },
          _el('span', { class: 'label-key' }, 'user:'),
          _el('code', {}, t.user_msg || '')),
        _el('div', { class: 'row' },
          _el('span', { class: 'label-key' }, 'tool:'),
          _el('code', {}, tc ? `${tc.name}(${JSON.stringify(tc.params)})` : 'none')),
        _el('div', { class: 'row' },
          _el('span', { class: 'label-key' }, 'sms:'),
          document.createTextNode(t.agent_sms || '')),
      ];

      if (mr && !mr.passed) {
        rows.push(_el('div', { class: 'row', style: 'color:#991b1b' },
          mr.mismatches.map(m => `at ${m.path || '<root>'}: ${m.reason}`).join('; ')));
      }

      const dPrompt = _el('details', {},
        _el('summary', {}, 'brain prompt'),
        _el('pre', {}, t.brain_prompt || ''));
      const dMsgs = _el('details', {},
        _el('summary', {}, 'brain messages'),
        _el('pre', {}, t.brain_messages || ''));
      const dFrame = _el('details', {},
        _el('summary', {}, 'session before / after'),
        _el('pre', {}, `before: ${JSON.stringify(sb, null, 2)}\nafter:  ${JSON.stringify(sa, null, 2)}`));

      const scoreBtns = _el('div', { class: 'score-btns' },
        ...[1, 2, 3, 4, 5].map(n => _el('button', {
          class: currentScore === n ? 'active' : '',
          dataset: { score: String(n) },
        }, String(n)))
      );
      const savedAffordance = _el('span', {
        class: 'saved',
        style: 'display:' + (currentScore ? 'inline' : 'none'),
      }, 'saved ✓');
      const notesArea = _el('textarea', { placeholder: 'notes (why this grade?)' });
      notesArea.value = currentNotes;
      const saveBtn = _el('button', { class: 'save' }, 'Save label');

      const scoreWidget = _el('div', { class: 'score-widget' },
        scoreBtns, savedAffordance, notesArea, saveBtn);

      const priorBlock = otherPrior.length
        ? _el('div', { class: 'prior' },
          'Previous labels: ' + otherPrior.map(p =>
            `run #${p.run_id} → ${p.label}` + (p.notes ? ` ("${p.notes.slice(0, 40)}")` : '')
          ).join(', '))
        : null;

      const turn = _el('div', {
        class: 'turn',
        dataset: { traceId: t.trace_id },
      },
        _el('h3', {}, `Turn ${t.turn_index} `, badge),
        ...rows,
        dPrompt, dMsgs, dFrame,
        scoreWidget,
        priorBlock,
      );
      return turn;
    }

    document.addEventListener('click', async (e) => {
      if (e.target.matches('.score-btns button')) {
        const turnEl = e.target.closest('.turn');
        turnEl.querySelectorAll('.score-btns button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
      }
      if (e.target.matches('.score-widget button.save')) {
        const turnEl = e.target.closest('.turn');
        const trace_id = turnEl.dataset.traceId;
        const active = turnEl.querySelector('.score-btns button.active');
        if (!active) { alert('pick a score first'); return; }
        const label = parseInt(active.dataset.score, 10);
        const notes = turnEl.querySelector('textarea').value;
        const r = await fetch('/api/eval/labels', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trace_id, axis: AXIS, label, notes }),
        }).then(x => x.json());
        if (r.ok) {
          // Re-render the scenario so the chat-column bubble picks up the "labeled" badge
          // and the run-detail's labeled-count refreshes on next visit.
          if (state.view === 'scenario') showScenario(state.scenarioId);
        } else {
          alert('save failed: ' + (r.error || 'unknown'));
        }
      }
    });

    showRuns();
  </script>
</body>
</html>
