<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestie Eval Reports</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 24px; font-weight: 700; color: #fff; }
  .header h1 span { color: #FF6B35; }

  /* ── Toolbar ── */
  .toolbar {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar select {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    max-width: 360px;
    cursor: pointer;
  }
  .toolbar select:focus { outline: none; border-color: #FF6B35; }
  .toolbar-sep {
    width: 1px;
    height: 24px;
    background: #333;
    flex-shrink: 0;
  }
  .toolbar-vs {
    font-size: 11px;
    color: #666;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid #333;
    background: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .toolbar-vs:hover { border-color: #555; color: #aaa; }
  .toolbar-vs.active { border-color: #FF6B35; color: #FF6B35; }
  .compare-wrap { display: none; align-items: center; gap: 6px; }
  .compare-wrap.visible { display: flex; }
  .search-input {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    width: 180px;
    transition: border-color 0.15s;
  }
  .search-input:focus { outline: none; border-color: #FF6B35; }
  .search-input::placeholder { color: #555; }
  .toolbar-count {
    font-size: 12px;
    color: #666;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── Filter rows ── */
  .filter-rows {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-row-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 64px;
    flex-shrink: 0;
    text-align: right;
  }
  .filter-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #999;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: #555; color: #ccc; }
  .filter-btn.active { background: #FF6B35; border-color: #FF6B35; color: #fff; }

  /* ── Active filter chips ── */
  .active-chips {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 0;
    margin-bottom: 0;
    transition: margin 0.15s;
  }
  .active-chips.has-chips { margin-bottom: 16px; }
  .active-chips-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .chip:hover { opacity: 0.8; }
  .chip .chip-x {
    font-size: 13px;
    font-weight: 400;
    opacity: 0.7;
    margin-left: 2px;
  }
  .chip.category { background: #1a1a2a; color: #60a5fa; }
  .chip.difficulty { background: #1a2a1a; color: #86efac; }
  .chip.difficulty.must_pass { background: #2a1a1a; color: #fca5a5; }
  .chip.difficulty.stretch { background: #2a2a1a; color: #fde68a; }
  .chip.result-pass { background: #1a3a1a; color: #4ade80; }
  .chip.result-fail { background: #3a1a1a; color: #f87171; }
  .chip.result-error { background: #2a1a2a; color: #c084fc; }
  .clear-all {
    font-size: 11px;
    color: #666;
    cursor: pointer;
    padding: 3px 8px;
    border: 1px solid #333;
    border-radius: 12px;
    background: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .clear-all:hover { border-color: #555; color: #aaa; }

  /* ── Expand/Collapse all ── */
  .bulk-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .bulk-btn {
    background: none;
    border: 1px solid #333;
    color: #666;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .bulk-btn:hover { border-color: #555; color: #aaa; }

  /* ── Summary ── */
  .summary-section {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .summary-big {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 20px 28px;
    text-align: center;
    min-width: 140px;
  }
  .summary-big .label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .summary-big .value {
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
  }
  .summary-big .value.green { color: #4ade80; }
  .summary-big .value.yellow { color: #fbbf24; }
  .summary-big .value.red { color: #f87171; }
  .summary-big .sub {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
  }
  .summary-big .delta {
    font-size: 13px;
    font-weight: 500;
    margin-left: 4px;
  }
  .delta.up { color: #4ade80; }
  .delta.down { color: #f87171; }
  .delta.neutral { color: #666; }

  .summary-stats {
    flex: 1;
    min-width: 200px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label {
    font-size: 12px;
    color: #888;
    width: 90px;
    flex-shrink: 0;
  }
  .stat-value {
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
  }
  .stat-value.green { color: #4ade80; }
  .stat-value.red { color: #f87171; }
  .stat-value.yellow { color: #fbbf24; }
  .stat-value.purple { color: #c084fc; }

  /* ── Category breakdown inline ── */
  .category-breakdown {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .cat-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .cat-stat:hover { opacity: 0.8; }
  .cat-stat-name { color: #888; }
  .cat-stat-rate { font-weight: 700; }
  .cat-stat-rate.green { color: #4ade80; }
  .cat-stat-rate.yellow { color: #fbbf24; }
  .cat-stat-rate.red { color: #f87171; }
  .cat-stat-detail { color: #555; font-size: 11px; }

  /* ── Sparkline trend ── */
  .trend-section {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .trend-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .sparkline {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 36px;
  }
  .spark-bar {
    flex: 1;
    max-width: 32px;
    border-radius: 2px 2px 0 0;
    min-height: 2px;
    position: relative;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .spark-bar:hover { opacity: 0.75; }
  .spark-bar .spark-tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #e0e0e0;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    z-index: 10;
  }
  .spark-bar:hover .spark-tip { display: block; }

  /* ── Must-pass alert ── */
  .must-pass-alert {
    background: #2a0a0a;
    border: 1px solid #5a1a1a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .must-pass-alert.hidden { display: none; }
  .must-pass-alert h3 {
    color: #f87171;
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .must-pass-alert ul { list-style: none; }
  .must-pass-alert li {
    padding: 4px 0;
    border-bottom: 1px solid #3a1a1a;
    font-size: 12px;
    cursor: pointer;
    color: #e0a0a0;
    transition: color 0.15s;
  }
  .must-pass-alert li:hover { color: #fff; }
  .must-pass-alert li:last-child { border-bottom: none; }

  /* ── Status pills ── */
  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-pill.pass { background: #1a3a1a; color: #4ade80; }
  .status-pill.fail { background: #3a1a1a; color: #f87171; }
  .status-pill.error { background: #2a1a2a; color: #c084fc; }

  /* ── Scenario cards ── */
  .scenario-list { display: flex; flex-direction: column; gap: 6px; }
  .scenario-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    overflow: hidden;
    border-left: 4px solid #333;
    transition: border-color 0.15s;
  }
  .scenario-card.pass { border-left-color: #4ade80; }
  .scenario-card.fail { border-left-color: #f87171; }
  .scenario-card.error { border-left-color: #c084fc; }
  .scenario-card.changed { position: relative; }
  .scenario-card.changed::after {
    content: 'CHANGED';
    position: absolute;
    top: 10px;
    right: 10px;
    background: #3a2a0a;
    color: #fbbf24;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  .scenario-header {
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .scenario-header:hover { background: #1a1a1a; }
  .scenario-header-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .scenario-name {
    font-size: 13px;
    font-weight: 600;
    color: #ddd;
    flex: 1;
    min-width: 180px;
  }
  .scenario-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge.category { background: #1a1a2a; color: #60a5fa; }
  .badge.difficulty { background: #1a2a1a; color: #86efac; }
  .badge.difficulty.must_pass { background: #2a1a1a; color: #fca5a5; }
  .badge.difficulty.stretch { background: #2a2a1a; color: #fde68a; }
  .badge.turns { background: #1a1a1a; color: #777; }

  .scenario-preview {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    line-height: 1.4;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .scenario-preview .preview-label { color: #555; }

  .scenario-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .scenario-card.expanded .scenario-body {
    max-height: 8000px;
    transition: max-height 0.5s ease;
  }
  .scenario-body-inner {
    padding: 0 16px 16px 16px;
    border-top: 1px solid #222;
  }

  /* ── SMS bubbles ── */
  .chat-transcript {
    margin: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .chat-bubble.user {
    align-self: flex-end;
    background: #0b5cff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-bubble.bestie {
    align-self: flex-start;
    background: #2a2a2a;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, 'Cascadia Mono', monospace;
    font-size: 12px;
  }
  .chat-turn-marker {
    font-size: 10px;
    color: #444;
    text-align: center;
    padding: 2px 0;
  }
  .trace-inline {
    align-self: flex-start;
    max-width: 95%;
    font-size: 11px;
    color: #666;
    margin-top: -4px;
  }
  .trace-inline summary {
    cursor: pointer;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
    padding: 2px 0;
  }
  .trace-inline summary:hover { color: #999; }
  .trace-pool-wrap {
    position: relative;
    margin-top: 4px;
  }
  .trace-copy-btn {
    position: absolute;
    top: 4px;
    right: 6px;
    background: #222;
    border: 1px solid #333;
    color: #888;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    z-index: 1;
  }
  .trace-copy-btn:hover { color: #ccc; border-color: #555; }
  .trace-pool-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
    font-size: 10px;
    background: #111;
    border-radius: 6px;
    overflow: hidden;
  }
  .trace-pool-table th {
    text-align: left;
    color: #555;
    font-weight: 500;
    padding: 4px 8px;
    border-bottom: 1px solid #222;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .trace-pool-table td {
    padding: 3px 8px;
    color: #777;
    border-bottom: 1px solid #1a1a1a;
    white-space: nowrap;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .trace-pool-table tr.match-row td { color: #4ade80; }
  .trace-pool-table td.event-name { max-width: 280px; }
  .trace-pool-table td.venue-col { max-width: 180px; color: #666; }
  .trace-pool-table a.trace-link {
    color: #60a5fa;
    text-decoration: none;
    font-size: 9px;
  }
  .trace-pool-table a.trace-link:hover { text-decoration: underline; }
  .trace-pool-scroll {
    max-height: 260px;
    overflow-y: auto;
    border-radius: 6px;
  }
  .trace-tag {
    display: inline-block;
    font-size: 9px;
    padding: 0 4px;
    border-radius: 3px;
    margin-right: 4px;
  }
  .trace-tag-match { background: #14532d; color: #4ade80; }
  .trace-tag-free { background: #1e3a5f; color: #60a5fa; }
  .trace-tag-cat { background: #3f3f46; color: #a1a1aa; }
  .cache-meta-bar {
    font-size: 12px;
    color: #666;
    padding: 6px 12px;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    margin-bottom: 12px;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
  }

  /* ── Judgment section ── */
  .judgment-section {
    margin-top: 16px;
    padding: 12px;
    background: #0f0f0f;
    border-radius: 8px;
    border: 1px solid #1a1a1a;
  }
  .judgment-section h4 {
    font-size: 12px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .judgment-note {
    font-size: 13px;
    color: #ccc;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  /* ── Failure modes ── */
  .section-explainer {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .failure-modes-label {
    font-size: 11px;
    color: #888;
    margin-top: 8px;
    margin-bottom: 4px;
  }
  .failure-modes { margin-bottom: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .failure-badge {
    background: #3a1a1a;
    color: #f87171;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  /* ── Code eval table ── */
  .code-eval-section { margin-top: 10px; }
  .code-eval-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
    font-size: 12px;
  }
  .code-eval-table td { padding: 4px 8px 4px 0; vertical-align: top; }
  .ce-fail-icon { color: #f87171; font-weight: 700; width: 16px; }
  .ce-fail-label { color: #e0e0e0; font-weight: 500; white-space: nowrap; width: 140px; }
  .ce-fail-detail { color: #888; }
  .code-eval-summary-bar {
    background: #141414;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 12px;
    font-size: 12px;
    color: #aaa;
  }
  .code-eval-summary-bar .ce-label { color: #fbbf24; font-weight: 600; }
  .code-eval-summary-bar .ce-good { color: #4ade80; }
  .code-eval-breakdown { margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .code-eval-breakdown span { font-size: 11px; color: #888; }

  /* ── Turn grades ── */
  .turn-grades { display: flex; flex-direction: column; gap: 6px; }
  .turn-grade {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    padding: 6px 8px;
    background: #111;
    border-radius: 6px;
  }
  .turn-grade .turn-label {
    color: #666;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 50px;
  }
  .turn-grade .turn-result {
    font-weight: 600;
    flex-shrink: 0;
    min-width: 30px;
  }
  .turn-grade .turn-result.pass { color: #4ade80; }
  .turn-grade .turn-result.fail { color: #f87171; }
  .turn-grade .turn-note { color: #aaa; flex: 1; line-height: 1.5; }

  /* ── Assertions ── */
  .assertions { margin-top: 12px; }
  .assertion-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    padding: 4px 0;
    color: #aaa;
  }
  .assertion-icon { font-weight: 700; flex-shrink: 0; }
  .assertion-icon.pass { color: #4ade80; }
  .assertion-icon.fail { color: #f87171; }
  .assertion-detail { line-height: 1.5; }
  .assertion-detail code {
    background: #1a1a1a;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
    color: #ccc;
  }

  /* ── Error scenario ── */
  .error-message {
    padding: 12px;
    background: #1a0a2a;
    border: 1px solid #3a1a4a;
    border-radius: 8px;
    color: #c084fc;
    font-size: 13px;
    margin-top: 8px;
  }

  /* ── Section headers ── */
  .section-header {
    font-size: 12px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    margin-top: 8px;
  }

  /* ── Loading / empty ── */
  .loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    gap: 16px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #333;
    border-top-color: #FF6B35;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #666; font-size: 13px; }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #555;
    font-size: 14px;
  }

  /* ── Back to top ── */
  .back-to-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 40px;
    height: 40px;
    background: #FF6B35;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 200;
    transition: opacity 0.2s;
  }
  .back-to-top.visible { display: flex; }
  .back-to-top:hover { opacity: 0.85; }

  /* ── Keyboard hint ── */
  .keyboard-hint {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    border-top: 1px solid #333;
    padding: 6px 16px;
    font-size: 11px;
    color: #666;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
    z-index: 150;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .keyboard-hint kbd {
    background: #222;
    border: 1px solid #444;
    border-radius: 3px;
    padding: 1px 5px;
    color: #aaa;
    font-size: 11px;
  }
  .scenario-card.kbd-focus {
    outline: 2px solid #FF6B35;
    outline-offset: -2px;
  }

  /* ── Override badges ── */
  .override-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #1a2a3a;
    color: #60a5fa;
  }
  .override-pill.pass { background: #1a2a3a; color: #60a5fa; }
  .override-pill.fail { background: #3a1a2a; color: #f472b6; }
  .stale-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: #3a2a0a;
    color: #fbbf24;
    margin-left: 4px;
  }
  .override-excluded {
    text-decoration: line-through;
    opacity: 0.5;
  }

  /* ── Override panel ── */
  .override-panel {
    margin-top: 16px;
    padding: 12px;
    background: #0f0f1a;
    border-radius: 8px;
    border: 1px solid #1a2a3a;
  }
  .override-panel h4 {
    font-size: 12px;
    color: #60a5fa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .override-btns {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .ovr-btn {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
    font-family: inherit;
    background: #1a1a1a;
    color: #888;
  }
  .ovr-btn:hover { border-color: #555; color: #ccc; }
  .ovr-btn.ovr-pass { background: #1a3a1a; color: #4ade80; border-color: #2d5a2d; }
  .ovr-btn.ovr-pass:hover, .ovr-btn.ovr-pass.active { background: #2d5a2d; border-color: #4ade80; }
  .ovr-btn.ovr-fail { background: #3a1a1a; color: #f87171; border-color: #5a2d2d; }
  .ovr-btn.ovr-fail:hover, .ovr-btn.ovr-fail.active { background: #5a2d2d; border-color: #f87171; }
  .ovr-category-select {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
  }
  .ovr-notes {
    width: 100%;
    max-width: 500px;
    padding: 6px 10px;
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 12px;
    font-family: inherit;
    resize: vertical;
    min-height: 32px;
    margin-bottom: 8px;
  }
  .ovr-notes:focus { outline: none; border-color: #60a5fa; }
  .ovr-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .ovr-save {
    padding: 5px 16px;
    background: #2563eb;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .ovr-save:hover { background: #1d4ed8; }
  .ovr-clear {
    padding: 5px 16px;
    background: none;
    border: 1px solid #333;
    border-radius: 6px;
    color: #888;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .ovr-clear:hover { border-color: #555; color: #ccc; }
  .ovr-status {
    font-size: 11px;
    color: #666;
  }

  /* ── Adjusted stats ── */
  .adjusted-stats {
    font-size: 11px;
    color: #60a5fa;
    margin-top: 4px;
  }

  /* ── Regression report ── */
  .principle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .principle-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .principle-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .principle-id {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .principle-name {
    font-size: 11px;
    color: #888;
    margin-left: 6px;
    font-weight: 400;
  }
  .principle-rate {
    font-size: 16px;
    font-weight: 700;
  }
  .principle-rate.good { color: #4ade80; }
  .principle-rate.warn { color: #fbbf24; }
  .principle-rate.bad { color: #f87171; }
  .principle-bar-track {
    height: 6px;
    background: #222;
    border-radius: 3px;
    overflow: hidden;
  }
  .principle-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .principle-bar-fill.good { background: #4ade80; }
  .principle-bar-fill.warn { background: #fbbf24; }
  .principle-bar-fill.bad { background: #f87171; }
  .principle-detail {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }

  .regression-scenario-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .regression-assertion {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    padding: 6px 10px;
    background: #111;
    border-radius: 6px;
  }
  .regression-assertion .ra-icon { font-weight: 700; flex-shrink: 0; }
  .regression-assertion .ra-icon.pass { color: #4ade80; }
  .regression-assertion .ra-icon.fail { color: #f87171; }
  .regression-assertion .ra-principle {
    color: #60a5fa;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
  }
  .regression-assertion .ra-check { color: #ccc; flex: 1; }
  .regression-assertion .ra-evidence {
    color: #777;
    font-size: 11px;
    margin-top: 2px;
  }
  .regression-assertion .ra-reasoning {
    color: #999;
    font-size: 11px;
    font-style: italic;
    margin-top: 2px;
  }

  /* ── Shared nav ── */
  .bestie-nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; height: 36px;
    background: #111; border-bottom: 1px solid #222;
    padding: 0 16px; font-size: 13px;
    margin: -24px -24px 24px -24px;
  }
  .bestie-nav-link {
    color: #888; text-decoration: none; padding: 0 12px;
    line-height: 36px; transition: color 0.15s;
  }
  .bestie-nav-link:hover { color: #ccc; }
  .bestie-nav-link.active { color: #FF6B35; font-weight: 600; }
  .bestie-nav-sep { width: 1px; height: 16px; background: #333; margin: 0 4px; flex-shrink: 0; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    body { padding: 12px; }
    .bestie-nav { margin: -12px -12px 12px -12px; }
    .header h1 { font-size: 20px; }
    .summary-big .value { font-size: 32px; }
    .scenario-name { font-size: 12px; min-width: 140px; }
    .chat-bubble { max-width: 90%; }
    .search-input { width: 140px; }
    .filter-row-label { width: 48px; font-size: 9px; }
    .summary-section { flex-direction: column; }
    .category-breakdown { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<nav class="bestie-nav">
  <a href="/health" class="bestie-nav-link">Health</a>
  <a href="/events" class="bestie-nav-link">Events</a>
  <span class="bestie-nav-sep"></span>
  <a href="/eval" class="bestie-nav-link">Traces</a>
  <a href="/eval-report" class="bestie-nav-link active">Reports</a>
  <a href="/evals" class="bestie-nav-link">Eval Guide</a>
  <span class="bestie-nav-sep"></span>
  <a href="/test" class="bestie-nav-link">Simulator</a>
</nav>

<div class="header">
  <div>
    <h1><span>Bestie</span> Eval Reports</h1>
    <p style="font-size:13px;color:#777;margin-top:4px">Scenario, regression, and extraction audit results. Select a report to view, compare runs, or override false failures.</p>
  </div>
</div>

<div id="content">
  <div class="loading-container" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading eval reports...</div>
  </div>
</div>

<button class="back-to-top" id="back-to-top" title="Back to top">&#8593;</button>


<script>
// ── State ──
var allReports = [];
var currentReport = null;
var compareReport = null;
var overrides = {};
var filters = { category: 'all', difficulty: 'all', result: 'all', override: 'all' };
var searchQuery = '';
var compareVisible = false;

function isNoJudgeReport() {
  if (!currentReport) return false;
  var r = currentReport;
  if (r.judge_cost > 0) return false;
  var scenarios = r.scenarios || [];
  if (scenarios.length === 0) return false;
  return scenarios.every(function(s) { return s.pass == null; });
}

var REPORT_TYPES = [
  { key: 'scenario', label: 'Scenario Evals' },
  { key: 'regression', label: 'Regression Evals' },
  { key: 'extraction', label: 'Extraction Audits' },
  { key: 'scrape', label: 'Scrape Audits' },
];
function detectReportType(filename) {
  if (filename.startsWith('scenario-eval-')) return 'scenario';
  if (filename.startsWith('regression-eval-')) return 'regression';
  if (filename.startsWith('extraction-audit-')) return 'extraction';
  if (filename.startsWith('scrape-audit-')) return 'scrape';
  return 'unknown';
}

var CATEGORIES = ['all', 'happy_path', 'filter_drift', 'edge_case', 'poor_experience', 'abuse_off_topic'];
var DIFFICULTIES = ['all', 'must_pass', 'should_pass', 'stretch'];
var RESULTS = ['all', 'pass', 'fail', 'error'];
var OVERRIDE_FILTERS = ['all', 'has_override', 'no_override', 'stale'];

// ── Init ──
async function init() {
  readHashState();
  await Promise.all([loadReportList(), loadOverrides()]);
  if (allReports.length === 0) {
    showEmpty();
    return;
  }
  populateSelects();
  // Default to most recent scenario eval (primary use case), fall back to first report
  var defaultReport = allReports.find(function(r) { return (r.type || detectReportType(r.filename)) === 'scenario'; }) || allReports[0];
  await loadReport(defaultReport.filename);
  setupEventListeners();
}

async function loadOverrides() {
  try {
    var res = await fetch('/api/eval-overrides');
    overrides = await res.json();
  } catch (e) {
    console.error('Failed to load overrides:', e);
    overrides = {};
  }
}

function readHashState() {
  var hash = window.location.hash.substring(1);
  if (!hash) return;
  hash.split('&').forEach(function(pair) {
    var parts = pair.split('=');
    if (parts.length === 2) {
      var key = decodeURIComponent(parts[0]);
      var val = decodeURIComponent(parts[1]);
      if (key === 'category' && CATEGORIES.indexOf(val) !== -1) filters.category = val;
      if (key === 'difficulty' && DIFFICULTIES.indexOf(val) !== -1) filters.difficulty = val;
      if (key === 'result' && RESULTS.indexOf(val) !== -1) filters.result = val;
      if (key === 'override' && OVERRIDE_FILTERS.indexOf(val) !== -1) filters.override = val;
      if (key === 'search') searchQuery = val;
    }
  });
}

function writeHashState() {
  var parts = [];
  if (filters.category !== 'all') parts.push('category=' + encodeURIComponent(filters.category));
  if (filters.difficulty !== 'all') parts.push('difficulty=' + encodeURIComponent(filters.difficulty));
  if (filters.result !== 'all') parts.push('result=' + encodeURIComponent(filters.result));
  if (filters.override !== 'all') parts.push('override=' + encodeURIComponent(filters.override));
  if (searchQuery) parts.push('search=' + encodeURIComponent(searchQuery));
  var hash = parts.length > 0 ? '#' + parts.join('&') : '';
  if (window.location.hash !== hash) {
    history.replaceState(null, '', window.location.pathname + hash);
  }
}

async function loadReportList() {
  try {
    var res = await fetch('/api/eval-reports');
    allReports = await res.json();
  } catch (e) {
    console.error('Failed to load report list:', e);
    allReports = [];
  }
}

async function loadReport(filename) {
  showLoading();
  try {
    var res = await fetch('/api/eval-reports/' + encodeURIComponent(filename));
    currentReport = await res.json();
    currentReport._filename = filename;
    render();
  } catch (e) {
    console.error('Failed to load report:', e);
    showEmpty('Failed to load report.');
  }
}

async function loadCompareReport(filename) {
  try {
    var res = await fetch('/api/eval-reports/' + encodeURIComponent(filename));
    compareReport = await res.json();
    render();
  } catch (e) {
    console.error('Failed to load compare report:', e);
    compareReport = null;
  }
}

function populateSelects() {}

// ── Sorting ──
function scenarioResult(s) {
  if (s.error) return 'error';
  if (isNoJudgeReport()) return (s.code_eval_failures || []).length > 0 ? 'fail' : 'pass';
  return s.pass ? 'pass' : 'fail';
}

function sortScenarios(scenarios) {
  var order = { error: 0, fail: 1, pass: 2 };
  var tierOrder = { must_pass: 0, should_pass: 1, stretch: 2 };
  return scenarios.slice().sort(function(a, b) {
    var rDiff = (order[scenarioResult(a)] || 2) - (order[scenarioResult(b)] || 2);
    if (rDiff !== 0) return rDiff;
    var aTier = tierOrder[a.difficulty] != null ? tierOrder[a.difficulty] : 9;
    var bTier = tierOrder[b.difficulty] != null ? tierOrder[b.difficulty] : 9;
    return aTier - bTier;
  });
}

// ── Override helpers ──
function getOverride(scenarioName) {
  return overrides[scenarioName] || null;
}

function isOverrideStale(scenario, ovr) {
  if (!ovr) return false;
  var resultPass;
  if (isNoJudgeReport()) {
    resultPass = (scenario.code_eval_failures || []).length === 0;
  } else {
    resultPass = scenario.error ? false : !!scenario.pass;
  }
  return ovr.against_llm_verdict !== resultPass;
}

function computeAdjustedStats(scenarios) {
  var noJudge = isNoJudgeReport();
  var passed = 0, failed = 0, excluded = 0, total = scenarios.length;
  scenarios.forEach(function(s) {
    var ovr = getOverride(s.name);
    if (ovr && ovr.category === 'data_dependent') {
      excluded++;
      return;
    }
    var adjustedPass;
    if (ovr && ovr.category === 'false_failure') {
      adjustedPass = true;
    } else if (ovr && ovr.category === 'false_pass') {
      adjustedPass = false;
    } else if (noJudge) {
      adjustedPass = !s.error && (s.code_eval_failures || []).length === 0;
    } else {
      adjustedPass = !s.error && !!s.pass;
    }
    if (adjustedPass) passed++;
    else failed++;
  });
  var denom = total - excluded;
  return { passed: passed, failed: failed, excluded: excluded, total: denom, rate: denom > 0 ? (100 * passed / denom) : 0 };
}

// ── Render ──
function render() {
  if (!currentReport) return;
  var type = detectReportType(currentReport._filename);
  if (type === 'regression') { renderRegressionReport(); return; }
  if (type === 'extraction') { renderExtractionReport(); return; }
  if (type === 'scrape') { renderScrapeReport(); return; }
  var c = document.getElementById('content');
  var scenarios = currentReport.scenarios || [];
  var sorted = sortScenarios(scenarios);
  var passRate = currentReport.total > 0 ? (100 * currentReport.passed / currentReport.total) : 0;

  var html = '';

  // Toolbar
  html += renderToolbar();

  // Summary section
  html += renderSummary(passRate, scenarios);
  html += renderCacheMeta();

  // Category breakdown
  html += renderCategoryBreakdown(scenarios);

  // Trend sparkline
  html += renderSparkline();

  // Must-pass alert
  html += renderMustPassAlert(scenarios);

  // Filter rows
  html += renderFilterRows();

  // Active chips
  html += '<div class="active-chips" id="active-chips"></div>';

  // Bulk actions
  html += '<div class="bulk-actions">';
  html += '<button class="bulk-btn" id="expand-all-btn">Expand all</button>';
  html += '<button class="bulk-btn" id="collapse-all-btn">Collapse all</button>';
  html += '</div>';

  // Scenario cards
  html += '<div class="scenario-list" id="scenario-list">';
  sorted.forEach(function(s, i) {
    html += renderScenarioCard(s, i);
  });
  html += '</div>';

  // Keyboard hint bar (no-judge mode only)
  if (isNoJudgeReport()) {
    html += '<div class="keyboard-hint" id="keyboard-hint">';
    html += '<kbd>j</kbd>/<kbd>k</kbd> navigate &nbsp;&nbsp;';
    html += '<kbd>p</kbd> pass &nbsp;&nbsp;';
    html += '<kbd>f</kbd> fail &nbsp;&nbsp;';
    html += '<kbd>d</kbd> data-dep &nbsp;&nbsp;';
    html += '<kbd>x</kbd> clear';
    html += '</div>';
  }

  c.innerHTML = html;

  applyFilters();
  renderChips();
  writeHashState();
}

function renderRegressionReport() {
  var c = document.getElementById('content');
  var r = currentReport;
  var scenarios = r.scenarios || [];
  var byPrinciple = r.by_principle || {};
  var totalScenarios = r.total_scenarios || scenarios.length;
  var passedScenarios = r.scenarios_passed || scenarios.filter(function(s) { return s.pass; }).length;
  var passRate = totalScenarios > 0 ? (100 * passedScenarios / totalScenarios) : 0;

  var html = '';

  // Toolbar (shared)
  html += renderToolbar();

  // Summary
  html += '<div class="summary-section">';
  html += '<div class="summary-big">';
  html += '<div class="label">Scenario Pass Rate</div>';
  html += '<div class="value ' + passRateColor(passRate) + '">' + Math.round(passRate) + '%</div>';
  html += '<div class="sub">' + passedScenarios + ' of ' + totalScenarios + ' scenarios</div>';
  if (r.total_assertions) {
    var assertRate = (100 * r.assertions_passed / r.total_assertions).toFixed(0);
    html += '<div class="sub" style="color:#60a5fa">' + r.assertions_passed + '/' + r.total_assertions + ' assertions (' + assertRate + '%)</div>';
  }
  html += '</div>';
  html += '<div class="summary-stats">';
  html += statRow('Passed', passedScenarios, 'green');
  html += statRow('Failed', r.scenarios_failed || 0, (r.scenarios_failed || 0) > 0 ? 'red' : '');
  html += statRow('Errors', r.scenarios_errored || 0, (r.scenarios_errored || 0) > 0 ? 'purple' : '');
  if (r.judge_model) html += statRow('Judge', r.judge_model, '');
  html += '</div>';
  html += '</div>';

  html += renderCacheMeta();
  html += renderCodeEvalSummary(r);

  // Principle breakdown
  html += '<div class="section-header">Principles</div>';
  html += '<div class="section-explainer">Architecture principles (P1-P7) that govern how Bestie splits work between code and AI. Each has specific behavioral assertions.</div>';
  html += '<div class="principle-grid">';
  var principleIds = Object.keys(byPrinciple).sort();
  principleIds.forEach(function(pid) {
    var p = byPrinciple[pid];
    var rate = p.total > 0 ? Math.round(100 * p.passed / p.total) : 0;
    var rateClass = rate === 100 ? 'good' : rate >= 50 ? 'warn' : 'bad';
    html += '<div class="principle-card">';
    html += '<div class="principle-card-header">';
    html += '<div><span class="principle-id">' + escHtml(pid) + '</span>';
    if (p.name) html += '<span class="principle-name">' + escHtml(p.name) + '</span>';
    html += '</div>';
    html += '<span class="principle-rate ' + rateClass + '">' + rate + '%</span>';
    html += '</div>';
    html += '<div class="principle-bar-track"><div class="principle-bar-fill ' + rateClass + '" style="width:' + rate + '%"></div></div>';
    html += '<div class="principle-detail">' + p.passed + '/' + p.total + ' assertions</div>';
    html += '</div>';
  });
  html += '</div>';

  // Scenario list
  html += '<div class="section-header">Scenarios</div>';
  html += '<div class="regression-scenario-list">';
  scenarios.forEach(function(s, i) {
    var sPass = s.pass;
    var borderColor = s.error ? '#c084fc' : (sPass ? '#4ade80' : '#f87171');
    html += '<div class="scenario-card ' + (sPass ? 'pass' : s.error ? 'error' : 'fail') + '">';
    html += '<div class="scenario-header" onclick="toggleRegressionScenario(' + i + ')">';
    html += '<div class="scenario-header-top">';
    html += '<span class="scenario-name">' + escHtml(s.name) + '</span>';
    html += '<div class="scenario-badges">';
    if (s.assertions_total != null) {
      html += '<span class="badge turns">' + (s.assertions_passed || 0) + '/' + s.assertions_total + ' assertions</span>';
    }
    html += '<span class="status-pill ' + (sPass ? 'pass' : s.error ? 'error' : 'fail') + '">' + (sPass ? 'PASS' : s.error ? 'ERROR' : 'FAIL') + '</span>';
    html += '</div></div></div>';

    // Expandable body
    html += '<div class="scenario-body" id="reg-body-' + i + '">';
    html += '<div class="scenario-body-inner">';

    if (s.error) {
      html += '<div class="error-message">' + escHtml(s.error) + '</div>';
    } else if (s.assertions) {
      s.assertions.forEach(function(a) {
        html += '<div class="regression-assertion">';
        html += '<span class="ra-icon ' + (a.pass ? 'pass' : 'fail') + '">' + (a.pass ? '\u2713' : '\u2717') + '</span>';
        html += '<span class="ra-principle">' + escHtml(a.principle || '') + '</span>';
        html += '<div style="flex:1">';
        html += '<div class="ra-check">' + escHtml(a.check || a.id || '') + '</div>';
        if (a.evidence) html += '<div class="ra-evidence">' + escHtml(a.evidence) + '</div>';
        if (a.reasoning && !a.pass) html += '<div class="ra-reasoning">' + escHtml(a.reasoning) + '</div>';
        html += '</div></div>';
      });
    }

    // Code eval failures
    html += renderCodeEvalFailures(s);

    // Conversation transcript (if present)
    if (s.conversation && s.conversation.length > 0) {
      html += '<div class="section-header" style="margin-top:12px">Conversation</div>';
      html += '<div class="chat-transcript">';
      s.conversation.forEach(function(turn) {
        var bubbleClass = turn.sender === 'user' ? 'user' : 'bestie';
        if (turn.message) html += '<div class="chat-bubble ' + bubbleClass + '">' + escHtml(turn.message) + '</div>';
        if (turn.sender === 'bestie' && turn.trace_summary) {
          html += renderTraceSummary(turn.trace_summary, turn.trace_debug);
        }
      });
      html += '</div>';
    }

    html += '</div></div></div>';
  });
  html += '</div>';

  c.innerHTML = html;
}

function renderToolbar() {
  var currentFilename = currentReport ? currentReport._filename : '';
  var currentType = currentFilename ? detectReportType(currentFilename) : 'scenario';
  var isScenario = currentType === 'scenario';

  var html = '<div class="toolbar">';

  // Report selector — grouped by type, selected matches loaded report
  html += '<select id="report-select">';
  REPORT_TYPES.forEach(function(t) {
    var group = allReports.filter(function(r) { return (r.type || detectReportType(r.filename)) === t.key; });
    if (group.length === 0) return;
    html += '<optgroup label="' + escAttr(t.label) + '">';
    group.forEach(function(r) {
      var rate = r.total > 0 ? Math.round(100 * r.passed / r.total) : 0;
      var ts = formatTimestamp(r.timestamp);
      var label = ts + ' \u2014 ' + rate + '% (' + r.passed + '/' + r.total + ')';
      var sel = r.filename === currentFilename ? ' selected' : '';

    });
    html += '</optgroup>';
  });
  html += '</select>';

  // Scenario-only controls: Compare, Search, Count
  if (isScenario) {
    html += '<button class="toolbar-vs' + (compareVisible ? ' active' : '') + '" id="compare-btn" title="Compare two reports side by side">Compare</button>';
    html += '<div class="compare-wrap' + (compareVisible ? ' visible' : '') + '" id="compare-wrap">';
    html += '<select id="compare-select"><option value="">-- compare to --</option>';
    REPORT_TYPES.forEach(function(t) {
      var group = allReports.filter(function(r) { return (r.type || detectReportType(r.filename)) === t.key; });
      if (group.length === 0) return;
      html += '<optgroup label="' + escAttr(t.label) + '">';
      group.forEach(function(r) {
        var rate = r.total > 0 ? Math.round(100 * r.passed / r.total) : 0;
        var ts = formatTimestamp(r.timestamp);
        var label = ts + ' \u2014 ' + rate + '% (' + r.passed + '/' + r.total + ')';
        html += '<option value="' + escAttr(r.filename) + '">' + escHtml(label) + '</option>';
      });
      html += '</optgroup>';
    });
    html += '</select></div>';

    html += '<div class="toolbar-sep"></div>';
    html += '<input type="text" class="search-input" id="search-input" placeholder="Search scenarios..." value="' + escAttr(searchQuery) + '">';

function renderSummary(passRate, scenarios) {
  var r = currentReport;
  var noJudge = isNoJudgeReport();
  var cmp = compareReport;
  var cmpRate = cmp && cmp.total > 0 ? (100 * cmp.passed / cmp.total) : null;

  var html = '<div class="summary-section">';

  if (noJudge) {
    // Code eval as primary metric
    var ce = r.code_evals || {};
    var ceRate = ce.total > 0 ? (100 * ce.passed / ce.total) : 0;
    html += '<div class="summary-big">';
    html += '<div class="label">Code Eval Pass Rate</div>';
    html += '<div class="value ' + passRateColor(ceRate) + '">' + ceRate.toFixed(1) + '%</div>';
    html += '<div class="sub">' + (ce.passed || 0) + ' of ' + (ce.total || 0) + ' checks across ' + r.total + ' scenarios</div>';
    html += '<div class="sub" style="color:#666">No judge \u2014 run with --judge for behavioral scoring</div>';
    var adj = computeAdjustedStats(scenarios);
    var hasOverrides = Object.keys(overrides).length > 0;
    if (hasOverrides) {
      html += '<div class="adjusted-stats">Your verdicts: ' + Math.round(adj.rate) + '% (' + adj.passed + '/' + adj.total;
      if (adj.excluded > 0) html += ', ' + adj.excluded + ' excluded';
      html += ')</div>';
    }
    html += '</div>';

    // Stats column — no-judge
    html += '<div class="summary-stats">';
    var ceFailCount = scenarios.filter(function(s) { return (s.code_eval_failures || []).length > 0; }).length;
    var ceOkCount = scenarios.length - ceFailCount;
    html += statRow('Scenarios', scenarios.length, '');
    html += statRow('Code OK', ceOkCount, 'green');
    html += statRow('Code Fail', ceFailCount, ceFailCount > 0 ? 'red' : '');
    html += statRow('Duration', r.elapsed_seconds != null ? Math.round(r.elapsed_seconds) + 's' : 'N/A', '');
    html += '</div>';
  } else {
    // Judge mode — existing behavior
    html += '<div class="summary-big">';
    html += '<div class="label">Pass Rate</div>';
    html += '<div class="value ' + passRateColor(passRate) + '">' + Math.round(passRate) + '%';
    if (cmpRate != null) html += deltaHtml(passRate, cmpRate, '%');
    html += '</div>';
    html += '<div class="sub">' + r.passed + ' of ' + r.total + ' scenarios</div>';
    var adj = computeAdjustedStats(scenarios);
    var hasOverrides = Object.keys(overrides).length > 0;
    if (hasOverrides) {
      html += '<div class="adjusted-stats">Human-adjusted: ' + Math.round(adj.rate) + '% (' + adj.passed + '/' + adj.total;
      if (adj.excluded > 0) html += ', ' + adj.excluded + ' excluded';
      html += ')</div>';
    }
    html += '</div>';

    // Stats column
    html += '<div class="summary-stats">';
    html += statRow('Passed', r.passed, 'green', cmp ? deltaHtml(r.passed, cmp.passed) : '');
    html += statRow('Failed', r.failed, r.failed > 0 ? 'red' : '', cmp ? deltaHtml(r.failed, cmp.failed, '', true) : '');
    html += statRow('Errors', r.errors || 0, (r.errors || 0) > 0 ? 'purple' : '', cmp ? deltaHtml(r.errors || 0, cmp.errors || 0, '', true) : '');
    html += statRow('Duration', r.elapsed_seconds != null ? Math.round(r.elapsed_seconds) + 's' : 'N/A', '');
    html += statRow('Judge Cost', r.judge_cost != null ? '$' + r.judge_cost.toFixed(2) : 'N/A', '');
    if (r.judge_model) html += statRow('Judge', r.judge_model, '');
    html += '</div>';
  }

  html += '</div>';

  // Code eval summary bar
  html += renderCodeEvalSummary(r);

  return html;
}

function renderCodeEvalSummary(r) {
  var ce = r.code_evals;
  if (!ce || !ce.total) return '';
  var pct = (100 * ce.passed / ce.total).toFixed(1);
  var pctClass = parseFloat(pct) >= 90 ? 'ce-good' : '';
  var html = '<div class="code-eval-summary-bar">';
  html += '<span class="ce-label">Code Evals</span> ';
  html += '<span class="' + pctClass + '">' + ce.passed + '/' + ce.total + ' passed (' + pct + '%)</span>';
  html += '<div class="section-explainer" style="margin-top:4px;margin-bottom:0">Deterministic checks (no AI) — verify data accuracy: correct filters, valid URLs, matching neighborhoods, proper event selection.</div>';
  if (ce.by_name && Object.keys(ce.by_name).length > 0) {
    html += '<div class="code-eval-breakdown">';
    var names = Object.keys(ce.by_name).sort(function(a, b) { return ce.by_name[b] - ce.by_name[a]; });
    names.forEach(function(name) {
      var info = CODE_EVAL_INFO[name] || { label: name };
      html += '<span>' + escHtml(info.label) + ': ' + ce.by_name[name] + '</span>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function statRow(label, value, colorClass, delta) {
  return '<div class="stat-row">' +
    '<span class="stat-label">' + escHtml(label) + '</span>' +
    '<span class="stat-value ' + (colorClass || '') + '">' + escHtml(String(value)) + (delta || '') + '</span>' +
    '</div>';
}

function renderCacheMeta() {
  var r = currentReport;
  if (!r.cache_meta) return '';
  var cm = r.cache_meta;
  var parts = ['Cache: ' + (cm.cache_size || 0) + ' events'];
  if (cm.source_counts) {
    var srcCount = Object.keys(cm.source_counts).length;
    parts.push('from ' + srcCount + ' sources');
  }
  if (cm.cache_age_minutes != null) {
    var age = cm.cache_age_minutes < 60 ? cm.cache_age_minutes + 'min old' : Math.round(cm.cache_age_minutes / 60) + 'hr old';
    parts.push('(' + age + ')');
  }
  return '<div class="cache-meta-bar">' + escHtml(parts.join(' ')) + '</div>';
}

function renderTraceSummary(traceSummary, traceDebug) {
  if (!traceSummary) return '';
  var sent = traceSummary.sent_to_claude || 0;
  var matched = (traceSummary.pool_meta && traceSummary.pool_meta.matchCount) || 0;
  var picked = (traceSummary.picks && traceSummary.picks.length) || 0;
  var label = 'Pool: ' + sent + ' sent, ' + matched + ' matched, ' + picked + ' picked';

  // Show active filters in summary line if available
  if (traceDebug && traceDebug.active_filters) {
    var af = traceDebug.active_filters;
    var filterParts = [];
    if (af.category) filterParts.push(af.category);
    if (af.free_only) filterParts.push('free');
    if (af.time_after) filterParts.push('after ' + af.time_after);
    if (filterParts.length > 0) label += ' | Filters: ' + filterParts.join(', ');
  }

  var pool = traceSummary.sent_pool || [];
  if (pool.length === 0) {
    return '<details class="trace-inline"><summary>' + escHtml(label) + '</summary></details>';
  }

  // Build copyable plain-text version
  var copyLines = pool.map(function(e) {
    var tag = e.filter_match ? '[MATCH] ' : '';
    var venue = e.venue_name ? ' @ ' + e.venue_name : '';
    var price = e.is_free ? ' (free)' : (e.price_display ? ' (' + e.price_display + ')' : '');
    var url = e.ticket_url ? ' ' + e.ticket_url : '';
    return tag + (e.name || e.id) + venue + price + url;
  }).join('\n');
  var copyId = 'trace-copy-' + Math.random().toString(36).slice(2, 8);

  var html = '<details class="trace-inline">';
  html += '<summary>' + escHtml(label) + '</summary>';
  html += '<div class="trace-pool-wrap">';
  html += '<button class="trace-copy-btn" onclick="navigator.clipboard.writeText(document.getElementById(\'' + copyId + '\').dataset.copy).then(function(){var b=event.target;b.textContent=\'Copied!\';setTimeout(function(){b.textContent=\'Copy\'},1200)})">Copy</button>';
  html += '<div id="' + copyId + '" data-copy="' + escHtml(copyLines).replace(/"/g, '&quot;') + '">';
  html += '<div class="trace-pool-scroll"><table class="trace-pool-table">';
  html += '<tr><th></th><th>Event</th><th>Venue</th><th>Hood</th><th>Cat</th><th>Time</th><th>Price</th><th>Link</th></tr>';

  for (var i = 0; i < pool.length; i++) {
    var e = pool[i];
    var rowClass = e.filter_match ? ' class="match-row"' : '';
    var tags = '';
    if (e.filter_match) tags += '<span class="trace-tag trace-tag-match">MATCH</span>';

    var time = '';
    if (e.start_time_local) {
      var parts = e.start_time_local.split('T');
      time = parts.length > 1 ? parts[1].slice(0, 5) : e.start_time_local;
    }

    var price = e.is_free ? 'free' : (e.price_display || '--');
    var link = e.ticket_url
      ? '<a class="trace-link" href="' + escHtml(e.ticket_url) + '" target="_blank" rel="noopener">link</a>'
      : '';

    html += '<tr' + rowClass + '>';
    html += '<td>' + tags + '</td>';
    html += '<td class="event-name" title="' + escHtml(e.name || '') + '">' + escHtml(e.name || e.id) + '</td>';
    html += '<td class="venue-col" title="' + escHtml(e.venue_name || '') + '">' + escHtml(e.venue_name || '--') + '</td>';
    html += '<td>' + escHtml(e.neighborhood || '--') + '</td>';
    html += '<td>' + escHtml(e.category || '--') + '</td>';
    html += '<td>' + escHtml(time || '--') + '</td>';
    html += '<td>' + escHtml(price) + '</td>';
    html += '<td>' + link + '</td>';
    html += '</tr>';
  }

  html += '</table></div></div></div></details>';
  return html;
}

  filter_match_alignment:{ label: 'Filter alignment',    desc: 'Picks come from filter-matched events' },
  time_filter_accuracy:  { label: 'Time accuracy',       desc: 'Picks start after the requested time' },
  neighborhood_expansion_transparency: { label: 'Expansion noted', desc: 'SMS mentions when showing nearby hoods' },
  price_transparency:    { label: 'Price mentioned',     desc: 'SMS includes price or "free"' },
  schema_compliance:     { label: 'Valid JSON',           desc: 'LLM returned well-formed response' },
  latency_under_10s:     { label: 'Fast response',       desc: 'Under 10 seconds' },
};

function renderCodeEvalFailures(s) {
  var failures = s.code_eval_failures || [];
  var total = s.code_eval_total || 0;
  if (total === 0) return '';
  var passed = total - failures.length;
  var pct = Math.round(100 * passed / total);
  var pctColor = failures.length === 0 ? '#4ade80' : '#fbbf24';

  var html = '<div class="code-eval-section">';
  html += '<div class="section-header" style="margin-top:12px">Code Evals';
  html += ' <span style="font-size:11px;color:' + pctColor + ';font-weight:400">' + passed + '/' + total + ' (' + pct + '%)</span>';
  html += '</div>';

  if (failures.length > 0) {
    html += '<table class="code-eval-table"><tbody>';
    failures.forEach(function(f) {
      var info = CODE_EVAL_INFO[f.name] || { label: f.name, desc: '' };
      html += '<tr>';
      html += '<td class="ce-fail-icon">\u2717</td>';
      html += '<td class="ce-fail-label">' + escHtml(info.label) + '</td>';
      html += '<td class="ce-fail-detail">' + escHtml(f.detail || info.desc) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  } else {
    html += '<div style="font-size:12px;color:#4ade80;margin-top:4px">All checks passed</div>';
  }
  html += '</div>';
  return html;
}

function renderCategoryBreakdown(scenarios) {
  var groups = groupBy(scenarios, 'category');
  var cats = CATEGORIES.slice(1);
  var html = '<div class="category-breakdown">';
  cats.forEach(function(cat) {
    var g = groups[cat] || { pass: 0, fail: 0, error: 0, total: 0 };
    if (g.total === 0) return;
    var rate = Math.round(g.pass / g.total * 100);
    html += '<div class="cat-stat" data-cat-click="' + escAttr(cat) + '">';
    html += '<span class="cat-stat-name">' + formatLabel(cat) + '</span>';
    html += '<span class="cat-stat-rate ' + passRateColor(rate) + '">' + rate + '%</span>';
    html += '<span class="cat-stat-detail">' + g.pass + '/' + g.total + '</span>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderSparkline() {
  var scenarioReports = allReports.filter(function(r) { return (r.type || detectReportType(r.filename)) === 'scenario'; });
  var recent = scenarioReports.slice(0, 12).reverse();
  if (recent.length < 4) return '';
  var noJudge = isNoJudgeReport();
  var label = noJudge ? 'Code Eval Trend' : 'Pass Rate Trend';
  var html = '<div class="trend-section">';
  html += '<div class="trend-label">' + label + ' (last ' + recent.length + ' runs)</div>';
  html += '<div class="sparkline">';
  recent.forEach(function(r) {
    var rate;
    if (noJudge && r.code_evals && r.code_evals.total > 0) {
      rate = Math.round(100 * r.code_evals.passed / r.code_evals.total);
    } else {
      rate = r.total > 0 ? Math.round(100 * r.passed / r.total) : 0;
    }
    var h = Math.max(2, Math.round(rate * 0.34));
    var color = rate >= 70 ? '#1a5a1a' : (rate >= 40 ? '#5a4a1a' : '#5a1a1a');
    var ts = formatTimestamp(r.timestamp);
    html += '<div class="spark-bar" style="height:' + h + 'px; background:' + color + '">' +
      '<span class="spark-tip">' + escHtml(ts) + ' \u2014 ' + rate + '%</span>' +
      '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderMustPassAlert(scenarios) {
  var failures = scenarios.filter(function(s) {
    if (s.difficulty !== 'must_pass') return false;
    return scenarioResult(s) !== 'pass';
  });
  if (failures.length === 0) return '<div class="must-pass-alert hidden"></div>';
  var html = '<div class="must-pass-alert">';
  html += '<h3>Must-Pass Failures (' + failures.length + ')</h3>';
  html += '<ul>';
  failures.forEach(function(f) {
    html += '<li data-jump="' + escAttr(f.name) + '">' + escHtml(f.name);
    if (f.error) {
      html += ' <span style="color:#c084fc;font-size:11px">(error)</span>';
    }
    html += '</li>';
  });
  html += '</ul></div>';
  return html;
}

function renderFilterRows() {
  var html = '<div class="filter-rows">';

  // Category row
  html += '<div class="filter-row">';
  html += '<span class="filter-row-label">Category</span>';
  CATEGORIES.forEach(function(cat) {
    html += '<button class="filter-btn' + (filters.category === cat ? ' active' : '') +
      '" data-filter="category" data-value="' + escAttr(cat) + '">' + formatLabel(cat) + '</button>';
  });
  html += '</div>';

  // Difficulty row
  var diffTips = { all: 'Show all tiers', must_pass: 'Core behaviors that must always work', should_pass: 'Expected behaviors that should work in most cases', stretch: 'Aspirational behaviors, nice to have' };
  html += '<div class="filter-row">';
  html += '<span class="filter-row-label">Tier</span>';
  DIFFICULTIES.forEach(function(d) {
    html += '<button class="filter-btn' + (filters.difficulty === d ? ' active' : '') +
      '" data-filter="difficulty" data-value="' + escAttr(d) + '" title="' + escAttr(diffTips[d] || '') + '">' + formatLabel(d) + '</button>';
  });
  html += '</div>';

  // Result row
  html += '<div class="filter-row">';

  RESULTS.forEach(function(r) {
    html += '<button class="filter-btn' + (filters.result === r ? ' active' : '') +
      '" data-filter="result" data-value="' + escAttr(r) + '">' + formatLabel(r) + '</button>';
  });
  html += '</div>';

  // Override row
  html += '<div class="filter-row">';
  html += '<span class="filter-row-label">Override</span>';
  OVERRIDE_FILTERS.forEach(function(o) {
    html += '<button class="filter-btn' + (filters.override === o ? ' active' : '') +
      '" data-filter="override" data-value="' + escAttr(o) + '">' + formatLabel(o) + '</button>';
  });
  html += '</div>';

  html += '</div>';
