<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Eval Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 24px; font-weight: 700; color: #fff; }
  .header h1 span { color: #FF6B35; }

  /* ── Toolbar ── */
  .toolbar {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar select {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    max-width: 360px;
    cursor: pointer;
  }
  .toolbar select:focus { outline: none; border-color: #FF6B35; }
  .toolbar-sep {
    width: 1px;
    height: 24px;
    background: #333;
    flex-shrink: 0;
  }
  .toolbar-vs {
    font-size: 11px;
    color: #666;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid #333;
    background: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .toolbar-vs:hover { border-color: #555; color: #aaa; }
  .toolbar-vs.active { border-color: #FF6B35; color: #FF6B35; }
  .compare-wrap { display: none; align-items: center; gap: 6px; }
  .compare-wrap.visible { display: flex; }
  .search-input {
    background: #0a0a0a;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    width: 180px;
    transition: border-color 0.15s;
  }
  .search-input:focus { outline: none; border-color: #FF6B35; }
  .search-input::placeholder { color: #555; }
  .toolbar-count {
    font-size: 12px;
    color: #666;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── Filter rows ── */
  .filter-rows {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-row-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 64px;
    flex-shrink: 0;
    text-align: right;
  }
  .filter-btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #999;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: #555; color: #ccc; }
  .filter-btn.active { background: #FF6B35; border-color: #FF6B35; color: #fff; }

  /* ── Active filter chips ── */
  .active-chips {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 0;
    margin-bottom: 0;
    transition: margin 0.15s;
  }
  .active-chips.has-chips { margin-bottom: 16px; }
  .active-chips-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .chip:hover { opacity: 0.8; }
  .chip .chip-x {
    font-size: 13px;
    font-weight: 400;
    opacity: 0.7;
    margin-left: 2px;
  }
  .chip.category { background: #1a1a2a; color: #60a5fa; }
  .chip.difficulty { background: #1a2a1a; color: #86efac; }
  .chip.difficulty.must_pass { background: #2a1a1a; color: #fca5a5; }
  .chip.difficulty.stretch { background: #2a2a1a; color: #fde68a; }
  .chip.result-pass { background: #1a3a1a; color: #4ade80; }
  .chip.result-fail { background: #3a1a1a; color: #f87171; }
  .chip.result-error { background: #2a1a2a; color: #c084fc; }
  .clear-all {
    font-size: 11px;
    color: #666;
    cursor: pointer;
    padding: 3px 8px;
    border: 1px solid #333;
    border-radius: 12px;
    background: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .clear-all:hover { border-color: #555; color: #aaa; }

  /* ── Expand/Collapse all ── */
  .bulk-actions {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .bulk-btn {
    background: none;
    border: 1px solid #333;
    color: #666;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .bulk-btn:hover { border-color: #555; color: #aaa; }

  /* ── Summary ── */
  .summary-section {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .summary-big {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 20px 28px;
    text-align: center;
    min-width: 140px;
  }
  .summary-big .label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .summary-big .value {
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
  }
  .summary-big .value.green { color: #4ade80; }
  .summary-big .value.yellow { color: #fbbf24; }
  .summary-big .value.red { color: #f87171; }
  .summary-big .sub {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
  }
  .summary-big .delta {
    font-size: 13px;
    font-weight: 500;
    margin-left: 4px;
  }
  .delta.up { color: #4ade80; }
  .delta.down { color: #f87171; }
  .delta.neutral { color: #666; }

  .summary-stats {
    flex: 1;
    min-width: 200px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label {
    font-size: 12px;
    color: #888;
    width: 90px;
    flex-shrink: 0;
  }
  .stat-value {
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
  }
  .stat-value.green { color: #4ade80; }
  .stat-value.red { color: #f87171; }
  .stat-value.yellow { color: #fbbf24; }
  .stat-value.purple { color: #c084fc; }

  /* ── Category breakdown inline ── */
  .category-breakdown {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .cat-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .cat-stat:hover { opacity: 0.8; }
  .cat-stat-name { color: #888; }
  .cat-stat-rate { font-weight: 700; }
  .cat-stat-rate.green { color: #4ade80; }
  .cat-stat-rate.yellow { color: #fbbf24; }
  .cat-stat-rate.red { color: #f87171; }
  .cat-stat-detail { color: #555; font-size: 11px; }

  /* ── Sparkline trend ── */
  .trend-section {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .trend-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .sparkline {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 36px;
  }
  .spark-bar {
    flex: 1;
    max-width: 32px;
    border-radius: 2px 2px 0 0;
    min-height: 2px;
    position: relative;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .spark-bar:hover { opacity: 0.75; }
  .spark-bar .spark-tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #e0e0e0;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    z-index: 10;
  }
  .spark-bar:hover .spark-tip { display: block; }

  /* ── Must-pass alert ── */
  .must-pass-alert {
    background: #2a0a0a;
    border: 1px solid #5a1a1a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .must-pass-alert.hidden { display: none; }
  .must-pass-alert h3 {
    color: #f87171;
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .must-pass-alert ul { list-style: none; }
  .must-pass-alert li {
    padding: 4px 0;
    border-bottom: 1px solid #3a1a1a;
    font-size: 12px;
    cursor: pointer;
    color: #e0a0a0;
    transition: color 0.15s;
  }
  .must-pass-alert li:hover { color: #fff; }
  .must-pass-alert li:last-child { border-bottom: none; }

  /* ── Status pills ── */
  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-pill.pass { background: #1a3a1a; color: #4ade80; }
  .status-pill.fail { background: #3a1a1a; color: #f87171; }
  .status-pill.error { background: #2a1a2a; color: #c084fc; }

  /* ── Scenario cards ── */
  .scenario-list { display: flex; flex-direction: column; gap: 6px; }
  .scenario-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    overflow: hidden;
    border-left: 4px solid #333;
    transition: border-color 0.15s;
  }
  .scenario-card.pass { border-left-color: #4ade80; }
  .scenario-card.fail { border-left-color: #f87171; }
  .scenario-card.error { border-left-color: #c084fc; }
  .scenario-card.focused { box-shadow: 0 0 0 2px #FF6B35; }
  .scenario-card.changed { position: relative; }
  .scenario-card.changed::after {
    content: 'CHANGED';
    position: absolute;
    top: 10px;
    right: 10px;
    background: #3a2a0a;
    color: #fbbf24;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  .scenario-header {
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .scenario-header:hover { background: #1a1a1a; }
  .scenario-header-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .scenario-name {
    font-size: 13px;
    font-weight: 600;
    color: #ddd;
    flex: 1;
    min-width: 180px;
  }
  .scenario-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge.category { background: #1a1a2a; color: #60a5fa; }
  .badge.difficulty { background: #1a2a1a; color: #86efac; }
  .badge.difficulty.must_pass { background: #2a1a1a; color: #fca5a5; }
  .badge.difficulty.stretch { background: #2a2a1a; color: #fde68a; }
  .badge.turns { background: #1a1a1a; color: #777; }

  .scenario-preview {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    line-height: 1.4;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .scenario-preview .preview-label { color: #555; }

  .scenario-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .scenario-card.expanded .scenario-body {
    max-height: 8000px;
    transition: max-height 0.5s ease;
  }
  .scenario-body-inner {
    padding: 0 16px 16px 16px;
    border-top: 1px solid #222;
  }

  /* ── SMS bubbles ── */
  .chat-transcript {
    margin: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .chat-bubble.user {
    align-self: flex-end;
    background: #0b5cff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-bubble.pulse {
    align-self: flex-start;
    background: #2a2a2a;
    color: #e0e0e0;
    border-bottom-left-radius: 4px;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, 'Cascadia Mono', monospace;
    font-size: 12px;
  }
  .chat-turn-marker {
    font-size: 10px;
    color: #444;
    text-align: center;
    padding: 2px 0;
  }

  /* ── Judgment section ── */
  .judgment-section {
    margin-top: 16px;
    padding: 12px;
    background: #0f0f0f;
    border-radius: 8px;
    border: 1px solid #1a1a1a;
  }
  .judgment-section h4 {
    font-size: 12px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .judgment-note {
    font-size: 13px;
    color: #ccc;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  /* ── Failure modes ── */
  .failure-modes { margin-top: 10px; margin-bottom: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .failure-badge {
    background: #3a1a1a;
    color: #f87171;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  /* ── Turn grades ── */
  .turn-grades { display: flex; flex-direction: column; gap: 6px; }
  .turn-grade {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    padding: 6px 8px;
    background: #111;
    border-radius: 6px;
  }
  .turn-grade .turn-label {
    color: #666;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 50px;
  }
  .turn-grade .turn-result {
    font-weight: 600;
    flex-shrink: 0;
    min-width: 30px;
  }
  .turn-grade .turn-result.pass { color: #4ade80; }
  .turn-grade .turn-result.fail { color: #f87171; }
  .turn-grade .turn-note { color: #aaa; flex: 1; line-height: 1.5; }

  /* ── Assertions ── */
  .assertions { margin-top: 12px; }
  .assertion-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    padding: 4px 0;
    color: #aaa;
  }
  .assertion-icon { font-weight: 700; flex-shrink: 0; }
  .assertion-icon.pass { color: #4ade80; }
  .assertion-icon.fail { color: #f87171; }
  .assertion-detail { line-height: 1.5; }
  .assertion-detail code {
    background: #1a1a1a;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
    color: #ccc;
  }

  /* ── Error scenario ── */
  .error-message {
    padding: 12px;
    background: #1a0a2a;
    border: 1px solid #3a1a4a;
    border-radius: 8px;
    color: #c084fc;
    font-size: 13px;
    margin-top: 8px;
  }

  /* ── Section headers ── */
  .section-header {
    font-size: 12px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    margin-top: 8px;
  }

  /* ── Loading / empty ── */
  .loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    gap: 16px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #333;
    border-top-color: #FF6B35;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #666; font-size: 13px; }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #555;
    font-size: 14px;
  }

  /* ── Back to top ── */
  .back-to-top {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 40px;
    height: 40px;
    background: #FF6B35;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 200;
    transition: opacity 0.2s;
  }
  .back-to-top.visible { display: flex; }
  .back-to-top:hover { opacity: 0.85; }

  /* ── Keyboard hint ── */
  .keyboard-hint {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 10px;
    color: #555;
    z-index: 200;
    display: none;
  }
  .keyboard-hint kbd {
    background: #222;
    border: 1px solid #444;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: inherit;
    color: #888;
  }
  @media (min-width: 1024px) {
    .keyboard-hint { display: block; }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    body { padding: 12px; }
    .header h1 { font-size: 20px; }
    .summary-big .value { font-size: 32px; }
    .scenario-name { font-size: 12px; min-width: 140px; }
    .chat-bubble { max-width: 90%; }
    .search-input { width: 140px; }
    .filter-row-label { width: 48px; font-size: 9px; }
    .summary-section { flex-direction: column; }
    .category-breakdown { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Pulse <span>Eval Report</span></h1>
</div>

<div id="content">
  <div class="loading-container" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading eval reports...</div>
  </div>
</div>

<button class="back-to-top" id="back-to-top" title="Back to top">&#8593;</button>

<div class="keyboard-hint">
  <kbd>j</kbd>/<kbd>k</kbd> navigate &middot;
  <kbd>Enter</kbd> expand &middot;
  <kbd>f</kbd> search &middot;
  <kbd>x</kbd> expand all &middot;
  <kbd>c</kbd> collapse all &middot;
  <kbd>Esc</kbd> clear filters
</div>

<script>
// ── State ──
var allReports = [];
var currentReport = null;
var compareReport = null;
var filters = { category: 'all', difficulty: 'all', result: 'all' };
var searchQuery = '';
var focusedIndex = -1;
var compareVisible = false;

var CATEGORIES = ['all', 'happy_path', 'filter_drift', 'edge_case', 'poor_experience', 'abuse_off_topic'];
var DIFFICULTIES = ['all', 'must_pass', 'should_pass', 'stretch'];
var RESULTS = ['all', 'pass', 'fail', 'error'];

// ── Init ──
async function init() {
  readHashState();
  await loadReportList();
  if (allReports.length === 0) {
    showEmpty();
    return;
  }
  populateSelects();
  await loadReport(allReports[0].filename);
  setupEventListeners();
}

function readHashState() {
  var hash = window.location.hash.substring(1);
  if (!hash) return;
  hash.split('&').forEach(function(pair) {
    var parts = pair.split('=');
    if (parts.length === 2) {
      var key = decodeURIComponent(parts[0]);
      var val = decodeURIComponent(parts[1]);
      if (key === 'category' && CATEGORIES.indexOf(val) !== -1) filters.category = val;
      if (key === 'difficulty' && DIFFICULTIES.indexOf(val) !== -1) filters.difficulty = val;
      if (key === 'result' && RESULTS.indexOf(val) !== -1) filters.result = val;
      if (key === 'search') searchQuery = val;
    }
  });
}

function writeHashState() {
  var parts = [];
  if (filters.category !== 'all') parts.push('category=' + encodeURIComponent(filters.category));
  if (filters.difficulty !== 'all') parts.push('difficulty=' + encodeURIComponent(filters.difficulty));
  if (filters.result !== 'all') parts.push('result=' + encodeURIComponent(filters.result));
  if (searchQuery) parts.push('search=' + encodeURIComponent(searchQuery));
  var hash = parts.length > 0 ? '#' + parts.join('&') : '';
  if (window.location.hash !== hash) {
    history.replaceState(null, '', window.location.pathname + hash);
  }
}

async function loadReportList() {
  try {
    var res = await fetch('/api/eval-reports');
    allReports = await res.json();
  } catch (e) {
    console.error('Failed to load report list:', e);
    allReports = [];
  }
}

async function loadReport(filename) {
  showLoading();
  try {
    var res = await fetch('/api/eval-reports/' + encodeURIComponent(filename));
    currentReport = await res.json();
    render();
  } catch (e) {
    console.error('Failed to load report:', e);
    showEmpty('Failed to load report.');
  }
}

async function loadCompareReport(filename) {
  try {
    var res = await fetch('/api/eval-reports/' + encodeURIComponent(filename));
    compareReport = await res.json();
    render();
  } catch (e) {
    console.error('Failed to load compare report:', e);
    compareReport = null;
  }
}

function populateSelects() {}

// ── Sorting ──
function sortScenarios(scenarios) {
  var order = { error: 0, fail: 1, pass: 2 };
  var tierOrder = { must_pass: 0, should_pass: 1, stretch: 2 };
  return scenarios.slice().sort(function(a, b) {
    var aResult = a.error ? 'error' : (a.pass ? 'pass' : 'fail');
    var bResult = b.error ? 'error' : (b.pass ? 'pass' : 'fail');
    var rDiff = (order[aResult] || 2) - (order[bResult] || 2);
    if (rDiff !== 0) return rDiff;
    var aTier = tierOrder[a.difficulty] != null ? tierOrder[a.difficulty] : 9;
    var bTier = tierOrder[b.difficulty] != null ? tierOrder[b.difficulty] : 9;
    return aTier - bTier;
  });
}

// ── Render ──
function render() {
  if (!currentReport) return;
  var c = document.getElementById('content');
  var scenarios = currentReport.scenarios || [];
  var sorted = sortScenarios(scenarios);
  var passRate = currentReport.total > 0 ? (100 * currentReport.passed / currentReport.total) : 0;

  var html = '';

  // Toolbar
  html += renderToolbar();

  // Summary section
  html += renderSummary(passRate, scenarios);

  // Category breakdown
  html += renderCategoryBreakdown(scenarios);

  // Trend sparkline (only if >3 reports)
  if (allReports.length > 3) {
    html += renderSparkline();
  }

  // Must-pass alert
  html += renderMustPassAlert(scenarios);

  // Filter rows
  html += renderFilterRows();

  // Active chips
  html += '<div class="active-chips" id="active-chips"></div>';

  // Bulk actions
  html += '<div class="bulk-actions">';
  html += '<button class="bulk-btn" id="expand-all-btn">Expand all</button>';
  html += '<button class="bulk-btn" id="collapse-all-btn">Collapse all</button>';
  html += '</div>';

  // Scenario cards
  html += '<div class="scenario-list" id="scenario-list">';
  sorted.forEach(function(s, i) {
    html += renderScenarioCard(s, i);
  });
  html += '</div>';

  c.innerHTML = html;

  applyFilters();
  renderChips();
  writeHashState();
}

function renderToolbar() {
  var html = '<div class="toolbar">';

  // Report selector
  html += '<select id="report-select">';
  allReports.forEach(function(r, i) {
    var rate = r.total > 0 ? Math.round(100 * r.passed / r.total) : 0;
    var ts = formatTimestamp(r.timestamp);
    var label = ts + ' \u2014 ' + rate + '% (' + r.passed + '/' + r.total + ')';
    html += '<option value="' + escAttr(r.filename) + '"' + (i === 0 ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  });
  html += '</select>';

  // Compare toggle
  html += '<button class="toolbar-vs' + (compareVisible ? ' active' : '') + '" id="compare-btn">vs</button>';
  html += '<div class="compare-wrap' + (compareVisible ? ' visible' : '') + '" id="compare-wrap">';
  html += '<select id="compare-select"><option value="">-- compare to --</option>';
  allReports.forEach(function(r) {
    var rate = r.total > 0 ? Math.round(100 * r.passed / r.total) : 0;
    var ts = formatTimestamp(r.timestamp);
    var label = ts + ' \u2014 ' + rate + '% (' + r.passed + '/' + r.total + ')';
    html += '<option value="' + escAttr(r.filename) + '">' + escHtml(label) + '</option>';
  });
  html += '</select></div>';

  html += '<div class="toolbar-sep"></div>';

  // Search
  html += '<input type="text" class="search-input" id="search-input" placeholder="Search scenarios..." value="' + escAttr(searchQuery) + '">';

  // Count
  html += '<span class="toolbar-count" id="toolbar-count"></span>';

  html += '</div>';
  return html;
}

function renderSummary(passRate, scenarios) {
  var r = currentReport;
  var cmp = compareReport;
  var cmpRate = cmp && cmp.total > 0 ? (100 * cmp.passed / cmp.total) : null;

  var html = '<div class="summary-section">';

  // Big pass rate
  html += '<div class="summary-big">';
  html += '<div class="label">Pass Rate</div>';
  html += '<div class="value ' + passRateColor(passRate) + '">' + Math.round(passRate) + '%';
  if (cmpRate != null) html += deltaHtml(passRate, cmpRate, '%');
  html += '</div>';
  html += '<div class="sub">' + r.passed + ' of ' + r.total + ' scenarios</div>';
  html += '</div>';

  // Stats column
  html += '<div class="summary-stats">';
  html += statRow('Passed', r.passed, 'green', cmp ? deltaHtml(r.passed, cmp.passed) : '');
  html += statRow('Failed', r.failed, r.failed > 0 ? 'red' : '', cmp ? deltaHtml(r.failed, cmp.failed, '', true) : '');
  html += statRow('Errors', r.errors || 0, (r.errors || 0) > 0 ? 'purple' : '', cmp ? deltaHtml(r.errors || 0, cmp.errors || 0, '', true) : '');
  html += statRow('Duration', r.elapsed_seconds != null ? Math.round(r.elapsed_seconds) + 's' : 'N/A', '');
  html += statRow('Judge Cost', r.judge_cost != null ? '$' + r.judge_cost.toFixed(2) : 'N/A', '');
  if (r.judge_model) html += statRow('Judge', r.judge_model, '');
  html += '</div>';

  html += '</div>';
  return html;
}

function statRow(label, value, colorClass, delta) {
  return '<div class="stat-row">' +
    '<span class="stat-label">' + escHtml(label) + '</span>' +
    '<span class="stat-value ' + (colorClass || '') + '">' + escHtml(String(value)) + (delta || '') + '</span>' +
    '</div>';
}

function renderCategoryBreakdown(scenarios) {
  var groups = groupBy(scenarios, 'category');
  var cats = CATEGORIES.slice(1);
  var html = '<div class="category-breakdown">';
  cats.forEach(function(cat) {
    var g = groups[cat] || { pass: 0, fail: 0, error: 0, total: 0 };
    if (g.total === 0) return;
    var rate = Math.round(g.pass / g.total * 100);
    html += '<div class="cat-stat" data-cat-click="' + escAttr(cat) + '">';
    html += '<span class="cat-stat-name">' + formatLabel(cat) + '</span>';
    html += '<span class="cat-stat-rate ' + passRateColor(rate) + '">' + rate + '%</span>';
    html += '<span class="cat-stat-detail">' + g.pass + '/' + g.total + '</span>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderSparkline() {
  var recent = allReports.slice(0, 12).reverse();
  var html = '<div class="trend-section">';
  html += '<div class="trend-label">Pass Rate Trend (last ' + recent.length + ' runs)</div>';
  html += '<div class="sparkline">';
  recent.forEach(function(r) {
    var rate = r.total > 0 ? Math.round(100 * r.passed / r.total) : 0;
    var h = Math.max(2, Math.round(rate * 0.34));
    var color = rate >= 70 ? '#1a5a1a' : (rate >= 40 ? '#5a4a1a' : '#5a1a1a');
    var ts = formatTimestamp(r.timestamp);
    html += '<div class="spark-bar" style="height:' + h + 'px; background:' + color + '">' +
      '<span class="spark-tip">' + escHtml(ts) + ' \u2014 ' + rate + '%</span>' +
      '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderMustPassAlert(scenarios) {
  var failures = scenarios.filter(function(s) { return s.difficulty === 'must_pass' && !s.pass; });
  if (failures.length === 0) return '<div class="must-pass-alert hidden"></div>';
  var html = '<div class="must-pass-alert">';
  html += '<h3>Must-Pass Failures (' + failures.length + ')</h3>';
  html += '<ul>';
  failures.forEach(function(f) {
    html += '<li data-jump="' + escAttr(f.name) + '">' + escHtml(f.name);
    if (f.error) {
      html += ' <span style="color:#c084fc;font-size:11px">(error)</span>';
    }
    html += '</li>';
  });
  html += '</ul></div>';
  return html;
}

function renderFilterRows() {
  var html = '<div class="filter-rows">';

  // Category row
  html += '<div class="filter-row">';
  html += '<span class="filter-row-label">Category</span>';
  CATEGORIES.forEach(function(cat) {
    html += '<button class="filter-btn' + (filters.category === cat ? ' active' : '') +
      '" data-filter="category" data-value="' + escAttr(cat) + '">' + formatLabel(cat) + '</button>';
  });
  html += '</div>';

  // Difficulty row
  html += '<div class="filter-row">';
  html += '<span class="filter-row-label">Tier</span>';
  DIFFICULTIES.forEach(function(d) {
    html += '<button class="filter-btn' + (filters.difficulty === d ? ' active' : '') +
      '" data-filter="difficulty" data-value="' + escAttr(d) + '">' + formatLabel(d) + '</button>';
  });
  html += '</div>';

  // Result row
  html += '<div class="filter-row">';
  html += '<span class="filter-row-label">Result</span>';
  RESULTS.forEach(function(r) {
    html += '<button class="filter-btn' + (filters.result === r ? ' active' : '') +
      '" data-filter="result" data-value="' + escAttr(r) + '">' + formatLabel(r) + '</button>';
  });
  html += '</div>';

  html += '</div>';
  return html;
}

function renderChips() {
  var el = document.getElementById('active-chips');
  if (!el) return;
  var chips = [];
  if (filters.category !== 'all') {
    chips.push('<span class="chip category" data-chip-clear="category">' + formatLabel(filters.category) + '<span class="chip-x">&times;</span></span>');
  }
  if (filters.difficulty !== 'all') {
    var dClass = 'difficulty' + (filters.difficulty === 'must_pass' ? ' must_pass' : '') + (filters.difficulty === 'stretch' ? ' stretch' : '');
    chips.push('<span class="chip ' + dClass + '" data-chip-clear="difficulty">' + formatLabel(filters.difficulty) + '<span class="chip-x">&times;</span></span>');
  }
  if (filters.result !== 'all') {
    var rClass = 'result-' + filters.result;
    chips.push('<span class="chip ' + rClass + '" data-chip-clear="result">' + formatLabel(filters.result) + '<span class="chip-x">&times;</span></span>');
  }
  if (chips.length > 0) {
    el.innerHTML = '<span class="active-chips-label">Active:</span>' + chips.join('') +
      '<button class="clear-all" id="clear-all-btn">Clear all</button>';
    el.classList.add('has-chips');
  } else {
    el.innerHTML = '';
    el.classList.remove('has-chips');
  }
}

function renderScenarioCard(s, sortIdx) {
  var resultClass = s.error ? 'error' : (s.pass ? 'pass' : 'fail');
  var resultLabel = s.error ? 'ERROR' : (s.pass ? 'PASS' : 'FAIL');

  // Compare changes
  var changedClass = '';
  if (compareReport) {
    var cmpScenarios = compareReport.scenarios || [];
    var cmpScenario = null;
    for (var ci = 0; ci < cmpScenarios.length; ci++) {
      if (cmpScenarios[ci].name === s.name) { cmpScenario = cmpScenarios[ci]; break; }
    }
    if (cmpScenario && cmpScenario.pass !== s.pass) changedClass = ' changed';
  }

  // Get preview text: first ~120 chars of judge note or error
  var preview = '';
  if (s.error) {
    preview = s.error;
  } else if (s.judgment && s.judgment.overall_note) {
    preview = s.judgment.overall_note;
  }
  if (preview.length > 120) preview = preview.substring(0, 120) + '...';

  var html = '<div class="scenario-card ' + resultClass + changedClass + '" ' +
    'data-sort-idx="' + sortIdx + '" ' +
    'data-category="' + escAttr(s.category || '') + '" ' +
    'data-difficulty="' + escAttr(s.difficulty || '') + '" ' +
    'data-result="' + (s.error ? 'error' : (s.pass ? 'pass' : 'fail')) + '" ' +
    'data-name="' + escAttr((s.name || '').toLowerCase()) + '" ' +
    'data-name-exact="' + escAttr(s.name || '') + '">';

  // Header
  html += '<div class="scenario-header">';
  html += '<div class="scenario-header-top">';
  html += '<span class="status-pill ' + resultClass + '">' + resultLabel + '</span>';
  html += '<span class="scenario-name">' + escHtml(s.name || 'Scenario ' + s.index) + '</span>';
  html += '<div class="scenario-badges">';
  if (s.category) html += '<span class="badge category">' + formatLabel(s.category) + '</span>';
  if (s.difficulty) html += '<span class="badge difficulty ' + escAttr(s.difficulty) + '">' + formatLabel(s.difficulty) + '</span>';
  if (s.user_turns) html += '<span class="badge turns">' + s.user_turns + ' turns</span>';
  html += '</div></div>';

  // Preview line for failures/errors
  if (!s.pass && preview) {
    var previewColor = s.error ? '#c084fc' : '#888';
    html += '<div class="scenario-preview" style="color:' + previewColor + '">';
    html += '<span class="preview-label">' + (s.error ? 'Error: ' : 'Judge: ') + '</span>';
    html += escHtml(preview);
    html += '</div>';
  }

  html += '</div>'; // .scenario-header

  // Body
  html += '<div class="scenario-body"><div class="scenario-body-inner">';

  if (s.error) {
    html += '<div class="error-message">' + escHtml(s.error) + '</div>';
  } else {
    // Conversation first
    if (s.actual_conversation && s.actual_conversation.length > 0) {
      html += '<div class="section-header" style="margin-top:8px">Conversation</div>';
      html += '<div class="chat-transcript">';
      var turnNum = 0;
      s.actual_conversation.forEach(function(msg) {
        if (msg.sender === 'user') {
          turnNum++;
          html += '<div class="chat-turn-marker">Turn ' + turnNum + '</div>';
        }
        var bubbleClass = msg.sender === 'user' ? 'user' : 'pulse';
        html += '<div class="chat-bubble ' + bubbleClass + '">' + escHtml(msg.message) + '</div>';
      });
      html += '</div>';
    }

    // Judgment
    if (s.judgment) {
      html += '<div class="judgment-section">';
      html += '<h4>Judge Verdict <span class="status-pill ' + (s.judgment.overall_pass ? 'pass' : 'fail') + '" style="margin-left:8px">' +
        (s.judgment.overall_pass ? 'PASS' : 'FAIL') + '</span></h4>';

      // Failure modes right after verdict header
      if (s.judgment.failure_modes_triggered && s.judgment.failure_modes_triggered.length > 0) {
        html += '<div class="failure-modes">';
        s.judgment.failure_modes_triggered.forEach(function(fm) {
          html += '<span class="failure-badge">' + escHtml(fm) + '</span>';
        });
        html += '</div>';
      }

      if (s.judgment.overall_note) {
        html += '<div class="judgment-note">' + escHtml(s.judgment.overall_note) + '</div>';
      }

      // Per-turn grades
      if (s.judgment.turns && s.judgment.turns.length > 0) {
        html += '<h4>Per-Turn Grades</h4>';
        html += '<div class="turn-grades">';
        s.judgment.turns.forEach(function(t) {
          var tResult = t.pass ? 'pass' : 'fail';
          html += '<div class="turn-grade">' +
            '<span class="turn-label">Turn ' + t.turn + '</span>' +
            '<span class="turn-result ' + tResult + '">' + (t.pass ? 'PASS' : 'FAIL') + '</span>' +
            '<span class="turn-note">' + escHtml(t.note || '') + '</span>' +
            '</div>';
        });
        html += '</div>';
      }

      html += '</div>'; // .judgment-section
    }

    // Assertions
    if (s.assertions && s.assertions.length > 0) {
      html += '<div class="assertions">';
      html += '<div class="section-header">Assertions</div>';
      s.assertions.forEach(function(a) {
        var icon = a.passed ? 'PASS' : 'FAIL';
        var cls = a.passed ? 'pass' : 'fail';
        html += '<div class="assertion-row">' +
          '<span class="assertion-icon ' + cls + '">' + icon + '</span>' +
          '<span class="assertion-detail">Turn ' + a.turn + ' ' + escHtml(a.assert_type) +
          ': expected <code>' + escHtml(String(a.expected)) + '</code>' +
          (a.passed ? '' : ', got <code>' + escHtml(String(a.actual || '').substring(0, 120)) + '</code>') +
          '</span></div>';
      });
      html += '</div>';
    }
  }

  html += '</div></div>'; // .scenario-body-inner, .scenario-body
  html += '</div>'; // .scenario-card
  return html;
}

// ── Filters ──
function applyFilters() {
  var cards = document.querySelectorAll('.scenario-card');
  var shown = 0;
  var total = cards.length;
  var q = searchQuery.toLowerCase().trim();

  cards.forEach(function(card) {
    var cat = card.dataset.category;
    var diff = card.dataset.difficulty;
    var res = card.dataset.result;
    var name = card.dataset.name || '';

    var visible = true;
    if (filters.category !== 'all' && cat !== filters.category) visible = false;
    if (filters.difficulty !== 'all' && diff !== filters.difficulty) visible = false;
    if (filters.result !== 'all' && res !== filters.result) visible = false;
    if (q && name.indexOf(q) === -1) visible = false;

    card.style.display = visible ? '' : 'none';
    if (visible) shown++;
  });

  var countEl = document.getElementById('toolbar-count');
  if (countEl) countEl.textContent = 'Showing ' + shown + ' of ' + total;
}

function clearAllFilters() {
  filters.category = 'all';
  filters.difficulty = 'all';
  filters.result = 'all';
  searchQuery = '';
  focusedIndex = -1;
  document.querySelectorAll('.scenario-card').forEach(function(c) { c.classList.remove('focused'); });
  render();
}

// ── Grouping ──
function groupBy(scenarios, field) {
  var groups = {};
  scenarios.forEach(function(s) {
    var key = s[field] || 'unknown';
    if (!groups[key]) groups[key] = { pass: 0, fail: 0, error: 0, total: 0 };
    groups[key].total++;
    if (s.error) groups[key].error++;
    else if (s.pass) groups[key].pass++;
    else groups[key].fail++;
  });
  return groups;
}

// ── Helpers ──
function passRateColor(rate) {
  if (rate >= 70) return 'green';
  if (rate >= 40) return 'yellow';
  return 'red';
}

function deltaHtml(current, prev, unit, inverted) {
  if (current == null || prev == null) return '';
  var diff = current - prev;
  if (Math.abs(diff) < 0.01) return '<span class="delta neutral">=</span>';
  var up = diff > 0;
  var good = inverted ? !up : up;
  var arrow = up ? '\u2191' : '\u2193';
  var cls = good ? 'up' : 'down';
  var display = Math.abs(Math.round(diff * 100) / 100);
  return '<span class="delta ' + cls + '">' + arrow + display + (unit || '') + '</span>';
}

function formatTimestamp(ts) {
  if (!ts) return '';
  try {
    var d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
      d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch (e) { return ts; }
}

function formatLabel(s) {
  if (s === 'all') return 'All';
  return s.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showLoading() {
  document.getElementById('content').innerHTML =
    '<div class="loading-container"><div class="spinner"></div><div class="loading-text">Loading report data...</div></div>';
}

function showEmpty(msg) {
  document.getElementById('content').innerHTML =
    '<div class="empty-state">' + escHtml(msg || 'No eval reports found. Run scenario evals to generate reports.') + '</div>';
  var loadEl = document.getElementById('loading');
  if (loadEl) loadEl.remove();
}

// ── Event listeners ──
function setupEventListeners() {
  // Delegated click handlers
  document.addEventListener('click', function(e) {
    // Expand/collapse scenario card
    var header = e.target.closest('.scenario-header');
    if (header) {
      var card = header.closest('.scenario-card');
      card.classList.toggle('expanded');
      return;
    }

    // Filter buttons
    var filterBtn = e.target.closest('.filter-btn');
    if (filterBtn) {
      var type = filterBtn.dataset.filter;
      var value = filterBtn.dataset.value;
      filters[type] = value;
      // Update active states in the row
      filterBtn.closest('.filter-row').querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      filterBtn.classList.add('active');
      applyFilters();
      renderChips();
      writeHashState();
      return;
    }

    // Chip clear
    var chip = e.target.closest('[data-chip-clear]');
    if (chip) {
      var filterType = chip.dataset.chipClear;
      filters[filterType] = 'all';
      // Update filter button state
      var filterRow = document.querySelector('.filter-btn[data-filter="' + filterType + '"][data-value="all"]');
      if (filterRow) {
        filterRow.closest('.filter-row').querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        filterRow.classList.add('active');
      }
      applyFilters();
      renderChips();
      writeHashState();
      return;
    }

    // Clear all button
    if (e.target.id === 'clear-all-btn' || e.target.closest('#clear-all-btn')) {
      clearAllFilters();
      return;
    }

    // Category breakdown click
    var catStat = e.target.closest('[data-cat-click]');
    if (catStat) {
      var cat = catStat.dataset.catClick;
      filters.category = filters.category === cat ? 'all' : cat;
      render();
      return;
    }

    // Must-pass jump
    var jumpItem = e.target.closest('[data-jump]');
    if (jumpItem) {
      var jumpName = jumpItem.dataset.jump;
      // Clear filters so target is visible
      filters.category = 'all';
      filters.difficulty = 'all';
      filters.result = 'all';
      searchQuery = '';
      render();
      setTimeout(function() {
        var targetCard = document.querySelector('.scenario-card[data-name-exact="' + CSS.escape(jumpName) + '"]');
        if (targetCard) {
          targetCard.classList.add('expanded');
          targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 50);
      return;
    }

    // Compare button
    if (e.target.id === 'compare-btn' || e.target.closest('#compare-btn')) {
      compareVisible = !compareVisible;
      var wrap = document.getElementById('compare-wrap');
      var btn = document.getElementById('compare-btn');
      if (wrap) wrap.classList.toggle('visible', compareVisible);
      if (btn) btn.classList.toggle('active', compareVisible);
      if (!compareVisible) {
        compareReport = null;
        render();
      }
      return;
    }

    // Expand all
    if (e.target.id === 'expand-all-btn' || e.target.closest('#expand-all-btn')) {
      document.querySelectorAll('.scenario-card').forEach(function(c) {
        if (c.style.display !== 'none') c.classList.add('expanded');
      });
      return;
    }

    // Collapse all
    if (e.target.id === 'collapse-all-btn' || e.target.closest('#collapse-all-btn')) {
      document.querySelectorAll('.scenario-card').forEach(function(c) {
        c.classList.remove('expanded');
      });
      return;
    }
  });

  // Report select change
  document.addEventListener('change', function(e) {
    if (e.target.id === 'report-select') {
      loadReport(e.target.value);
    }
    if (e.target.id === 'compare-select') {
      if (e.target.value) {
        loadCompareReport(e.target.value);
      } else {
        compareReport = null;
        render();
      }
    }
  });

  // Search input
  document.addEventListener('input', function(e) {
    if (e.target.id === 'search-input') {
      searchQuery = e.target.value;
      applyFilters();
      writeHashState();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
      if (e.key === 'Escape') {
        e.target.blur();
      }
      return;
    }

    var visibleCards = [];
    document.querySelectorAll('.scenario-card').forEach(function(c) {
      if (c.style.display !== 'none') visibleCards.push(c);
    });

    switch (e.key) {
      case 'j':
        e.preventDefault();
        focusedIndex = Math.min(focusedIndex + 1, visibleCards.length - 1);
        focusCard(visibleCards);
        break;
      case 'k':
        e.preventDefault();
        focusedIndex = Math.max(focusedIndex - 1, 0);
        focusCard(visibleCards);
        break;
      case 'Enter':
        e.preventDefault();
        if (focusedIndex >= 0 && focusedIndex < visibleCards.length) {
          visibleCards[focusedIndex].classList.toggle('expanded');
        }
        break;
      case 'f':
        e.preventDefault();
        var searchInput = document.getElementById('search-input');
        if (searchInput) searchInput.focus();
        break;
      case 'x':
        e.preventDefault();
        document.querySelectorAll('.scenario-card').forEach(function(c) {
          if (c.style.display !== 'none') c.classList.add('expanded');
        });
        break;
      case 'c':
        e.preventDefault();
        document.querySelectorAll('.scenario-card').forEach(function(c) {
          c.classList.remove('expanded');
        });
        break;
      case 'Escape':
        clearAllFilters();
        break;
    }
  });

  // Back to top
  var topBtn = document.getElementById('back-to-top');
  window.addEventListener('scroll', function() {
    topBtn.classList.toggle('visible', window.scrollY > 400);
  });
  topBtn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Hash change
  window.addEventListener('hashchange', function() {
    readHashState();
    render();
  });
}

function focusCard(visibleCards) {
  document.querySelectorAll('.scenario-card').forEach(function(c) { c.classList.remove('focused'); });
  if (focusedIndex >= 0 && focusedIndex < visibleCards.length) {
    visibleCards[focusedIndex].classList.add('focused');
    visibleCards[focusedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── Boot ──
init();
</script>
</body>
</html>
