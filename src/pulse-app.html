<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pulse — What's happening in NYC tonight</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --bg-surface: #111118;
      --bg-hover: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --text: #ededeb;
      --text-secondary: #8e8e8a;
      --text-muted: #555550;
      --coral: #ff6b42;
      --coral-dim: rgba(255,107,66,0.12);
      --green: #3fb950;
      --purple: #c4a1ff;
      --font: 'DM Sans', system-ui, -apple-system, sans-serif;
      --mono: 'DM Mono', ui-monospace, monospace;
    }
    html, body { height: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }

    /* TOP BAR */
    header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
    }
    .logo { font-weight: 700; font-size: 1.15rem; color: var(--coral); }
    .logo span { color: var(--text-secondary); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .sms-link { color: var(--coral); font-size: 0.82rem; font-weight: 500; text-decoration: none; padding: 6px 14px; border: 1px solid rgba(255,107,66,0.3); border-radius: 8px; transition: all 0.2s; }
    .sms-link:hover { background: var(--coral-dim); }

    /* CONVERSATION AREA */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      scroll-behavior: smooth;
    }
    .messages {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 120px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* MESSAGE BUBBLES */
    .turn { display: flex; flex-direction: column; gap: 6px; }
    .turn-user { align-items: flex-end; }
    .turn-bot { align-items: flex-start; }

    .bubble {
      max-width: 560px;
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 0.92rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .bubble-user {
      background: var(--coral);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .bubble-bot {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }
    .bubble-bot a { color: var(--coral); }

    /* SENDER LABEL */
    .sender { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); margin-bottom: 2px; padding: 0 4px; }

    /* EVENT CARDS (inline in conversation) */
    .event-cards {
      display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      max-width: 560px;
    }
    .event-cards::-webkit-scrollbar { display: none; }
    .ecard {
      flex-shrink: 0;
      width: 260px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ecard:hover { border-color: rgba(255,255,255,0.15); background: var(--bg-hover); }
    .ecard-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 4px; line-height: 1.3; }
    .ecard-venue { color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 8px; }
    .ecard-meta { display: flex; gap: 8px; align-items: center; font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 8px; }
    .ecard-meta .cat { color: var(--coral); font-family: var(--mono); font-weight: 500; font-size: 0.68rem; background: var(--coral-dim); padding: 2px 6px; border-radius: 4px; }
    .ecard-meta .free { color: var(--green); font-weight: 600; }
    .ecard-meta .time { font-family: var(--mono); }
    .ecard-why { color: var(--purple); font-size: 0.75rem; font-style: italic; line-height: 1.4; }
    .ecard-detail { color: var(--text-muted); font-size: 0.75rem; margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* TYPING INDICATOR */
    .typing-indicator {
      display: flex; gap: 5px; padding: 14px 18px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 20px; border-bottom-left-radius: 6px;
      max-width: 80px; align-self: flex-start;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse-dot { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

    /* SUGGESTIONS */
    .suggestions {
      display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0;
      max-width: 560px;
    }
    .suggestion {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      font: 500 0.82rem var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion:hover { border-color: var(--coral); color: var(--coral); background: var(--coral-dim); }

    /* INPUT BAR */
    .input-bar {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 14px 20px;
    }
    .input-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-inner textarea {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 18px;
      color: var(--text);
      font: 0.92rem var(--font);
      line-height: 1.5;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 46px;
      overflow-y: auto;
    }
    .input-inner textarea::placeholder { color: var(--text-muted); }
    .input-inner textarea:focus { border-color: rgba(255,255,255,0.15); }
    .send-btn {
      width: 46px; height: 46px;
      border-radius: 14px;
      background: var(--coral);
      border: none; color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }

    /* SMS CTA (inline in conversation) */
    .sms-cta {
      background: linear-gradient(135deg, rgba(255,107,66,0.1), rgba(255,107,66,0.04));
      border: 1px solid rgba(255,107,66,0.2);
      border-radius: 16px;
      padding: 20px;
      max-width: 400px;
    }
    .sms-cta h3 { font-size: 0.92rem; margin-bottom: 6px; }
    .sms-cta p { color: var(--text-secondary); font-size: 0.82rem; margin-bottom: 14px; line-height: 1.5; }
    .sms-cta-form { display: flex; gap: 8px; }
    .sms-cta-form input {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text); font: 0.85rem var(--font); outline: none;
    }
    .sms-cta-form input::placeholder { color: var(--text-muted); }
    .sms-cta-form button {
      background: var(--coral); border: none; color: #fff; padding: 10px 18px;
      border-radius: 10px; font: 600 0.82rem var(--font); cursor: pointer; white-space: nowrap;
    }
    .sms-cta .success { color: var(--green); font-size: 0.82rem; font-weight: 500; display: none; margin-top: 8px; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .ecard { width: 220px; }
      .header-right .sms-link span.desktop { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Pulse <span>NYC tonight</span></div>
  <div class="header-right">
    <a class="sms-link" href="#sms" onclick="showSmsCta()">Get this via SMS</a>
  </div>
</header>

<div class="conversation" id="conversation">
  <div class="messages" id="messages">
    <!-- Welcome turn -->
    <div class="turn turn-bot">
      <div class="sender">Pulse</div>
      <div class="bubble bubble-bot">Hey! I'm Pulse — I know what's happening in NYC tonight. Drop a neighborhood, a vibe, or just ask me anything.</div>
      <div class="suggestions" id="initial-suggestions">
        <div class="suggestion" onclick="send('williamsburg')">Williamsburg</div>
        <div class="suggestion" onclick="send('something chill in LES')">Something chill</div>
        <div class="suggestion" onclick="send('best comedy tonight')">Comedy tonight</div>
        <div class="suggestion" onclick="send('bushwick')">Bushwick</div>
        <div class="suggestion" onclick="send('free stuff this weekend')">Free this weekend</div>
        <div class="suggestion" onclick="send('dinner and a show')">Dinner + show</div>
      </div>
    </div>
  </div>
</div>

<div class="input-bar">
  <div class="input-inner">
    <textarea id="input" rows="1" placeholder="Try &quot;williamsburg&quot; or &quot;something weird tonight&quot;..."
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendInput()">&#x2191;</button>
  </div>
</div>

<script>
const chatPhone = '+1555' + Math.floor(Math.random() * 9000000 + 1000000);
let messageCount = 0;
let sending = false;

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function formatTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York' }); }
  catch { return ''; }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInput(); }
}

function scrollToBottom() {
  const conv = document.getElementById('conversation');
  requestAnimationFrame(() => { conv.scrollTop = conv.scrollHeight; });
}

function addUserMessage(text) {
  const el = document.getElementById('initial-suggestions');
  if (el) el.remove();

  const messages = document.getElementById('messages');
  const turn = document.createElement('div');
  turn.className = 'turn turn-user';
  turn.innerHTML = `<div class="bubble bubble-user">${esc(text)}</div>`;
  messages.appendChild(turn);
  scrollToBottom();
}

function addTypingIndicator() {
  const messages = document.getElementById('messages');
  const turn = document.createElement('div');
  turn.className = 'turn turn-bot';
  turn.id = 'typing-turn';
  turn.innerHTML = `
    <div class="sender">Pulse</div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>
  `;
  messages.appendChild(turn);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-turn');
  if (el) el.remove();
}

function addBotMessage(text, events) {
  const messages = document.getElementById('messages');
  const turn = document.createElement('div');
  turn.className = 'turn turn-bot';

  let html = `<div class="sender">Pulse</div><div class="bubble bubble-bot">${esc(text)}</div>`;

  // Render inline event cards if we have event data
  if (events && events.length > 0) {
    html += `<div class="event-cards">`;
    for (const e of events) {
      html += `
        <div class="ecard" onclick="send('tell me about ${esc((e.name || '').slice(0, 30))}')">
          <div class="ecard-name">${esc(e.name)}</div>
          <div class="ecard-venue">${esc(e.venue_name || '')}${e.neighborhood ? ' · ' + esc(e.neighborhood) : ''}</div>
          <div class="ecard-meta">
            <span class="cat">${esc(e.category || '')}</span>
            ${e.start_time_local ? `<span class="time">${formatTime(e.start_time_local)}</span>` : ''}
            ${e.is_free ? '<span class="free">FREE</span>' : e.price_display ? `<span>${esc(e.price_display)}</span>` : ''}
          </div>
          ${e.short_detail ? `<div class="ecard-detail">${esc(e.short_detail)}</div>` : ''}
          ${e.why ? `<div class="ecard-why">${esc(e.why)}</div>` : ''}
        </div>`;
    }
    html += `</div>`;
  }

  // Add follow-up suggestions
  if (messageCount <= 3) {
    html += `<div class="suggestions">
      <div class="suggestion" onclick="send('more')">More picks</div>
      <div class="suggestion" onclick="send('tell me about the first one')">Details</div>
      <div class="suggestion" onclick="send('anything free?')">Free only</div>
    </div>`;
  }

  turn.innerHTML = html;
  messages.appendChild(turn);
  scrollToBottom();

  // Show SMS CTA after 3 messages
  messageCount++;
  if (messageCount === 3) {
    setTimeout(() => addSmsCta(), 800);
  }
}

function addSmsCta() {
  const messages = document.getElementById('messages');
  const turn = document.createElement('div');
  turn.className = 'turn turn-bot';
  turn.innerHTML = `
    <div class="sms-cta" id="sms-cta">
      <h3>Like this? Get it via text.</h3>
      <p>Same conversation, delivered by SMS. Pulse can text you proactively when something great comes up in your neighborhood.</p>
      <div class="sms-cta-form" id="sms-cta-form">
        <input type="tel" id="sms-phone" placeholder="Phone number">
        <button onclick="submitPhone()">Text me</button>
      </div>
      <div class="success" id="sms-success">Check your texts!</div>
    </div>
  `;
  messages.appendChild(turn);
  scrollToBottom();
}

function showSmsCta() {
  if (!document.getElementById('sms-cta')) addSmsCta();
  else document.getElementById('sms-cta').scrollIntoView({ behavior: 'smooth' });
}

async function send(text) {
  if (sending || !text.trim()) return;
  sending = true;
  document.getElementById('send-btn').disabled = true;

  addUserMessage(text);
  addTypingIndicator();

  try {
    const r = await fetch('/api/sms/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ Body: text, From: chatPhone }),
    });
    const data = await r.json();
    removeTypingIndicator();

    const reply = data.messages?.[0]?.body || 'Something went wrong — try again!';
    const events = data.trace?.events?.sent_pool || null;
    addBotMessage(reply, events);
  } catch (err) {
    removeTypingIndicator();
    addBotMessage('Hit a snag — try that again?');
  }

  sending = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}

function sendInput() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  send(text);
}

async function submitPhone() {
  const input = document.getElementById('sms-phone');
  const phone = input.value.trim();
  if (!phone || phone.length < 10) { input.style.borderColor = '#ef4444'; return; }
  try {
    await fetch('/api/sms/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ Body: 'hey', From: phone }),
    });
    document.getElementById('sms-cta-form').style.display = 'none';
    document.getElementById('sms-success').style.display = 'block';
  } catch { input.style.borderColor = '#ef4444'; }
}

// Focus input on load
document.getElementById('input').focus();
</script>
</body>
</html>
